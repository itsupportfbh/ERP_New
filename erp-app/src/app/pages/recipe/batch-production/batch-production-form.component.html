<div class="bpx-page">
  <!-- Header -->
  <div class="bpx-head">
    <h2 class="bpx-title">Batch Production Execution</h2>
    <div class="bpx-actions">
      <button class="bpx-btn cancel" type="button" (click)="cancel()">✕ Cancel</button>
      <button class="bpx-btn post" type="button" [disabled]="!canPost()" (click)="postToInventory()">
        <span class="btn-spinner" *ngIf="posting"></span>
        {{ posting ? 'Posting…' : '✔ Post & Save to Inventory' }}
      </button>
    </div>
  </div>

  <div class="loading-row" *ngIf="loading"><div class="spinner-sm"></div> Loading…</div>

  <ng-container *ngIf="!loading">
    <!-- Top bar: plan + KPIs + posted date -->
    <div class="bpx-bar">
      <div class="bpx-field bpx-plan">
        <label class="bpx-label">Select Plan</label>
        <select class="bpx-select" [(ngModel)]="productionPlanId" name="plan" (ngModelChange)="onPlanChange()" [disabled]="isPosted">
          <option [ngValue]="null">-- Select Plan --</option>
          <option *ngFor="let p of planOptions" [ngValue]="p.value">{{ p.label }}</option>
        </select>
      </div>

      <div class="bpx-kpi">
        <div class="k-lbl">Recipes</div>
        <div class="k-val">{{ lines.length || 0 }}</div>
      </div>

      <div class="bpx-kpi warn">
        <div class="k-lbl">Variance Items</div>
        <div class="k-val">{{ varianceCount }}</div>
      </div>

      <div class="bpx-field bpx-date">
        <label class="bpx-label">Posted Date</label>
        <input type="date" class="bpx-date-input" [(ngModel)]="postedDate" name="postedDate" [min]="minPostedDate" [disabled]="isPosted"/>
      </div>
    </div>

    <!-- Lines table -->
    <div class="bpx-card">
      <table class="bpx-table">
        <thead>
          <tr>
            <th>Recipe</th>
            <th class="ta-r">Planned</th>
            <th class="ta-c">Actual Produced</th>
            <th class="ta-c">Variance</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let line of lines; let i = index">
            <td>
              <div class="bpx-recipe">{{ line.recipeName || '-' }}</div>
              <div class="bpx-uom">{{ line.uom || '—' }}</div>
            </td>
            <td class="ta-r"><span class="bpx-pill plain">{{ line.plannedQty }}</span></td>
            <td class="ta-c">
              <input type="number" class="bpx-actual" [ngModel]="line.actualQty" (ngModelChange)="onActualChange(i, $event)" name="actual{{i}}" [disabled]="isPosted" min="0"/>
            </td>
            <td class="ta-c"><span class="bpx-pill" [ngClass]="varClass(line)">{{ variance(line) }}</span></td>
          </tr>
          <tr *ngIf="!lines.length">
            <td colspan="4" class="bpx-empty">Select a plan to load recipes</td>
          </tr>
        </tbody>
      </table>
    </div>
  </ng-container>
</div>
