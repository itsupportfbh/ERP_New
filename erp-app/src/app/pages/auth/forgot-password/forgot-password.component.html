<div class="fp-page">

  <!-- ═══ LEFT PANEL ═══ -->
  <div class="fp-left">
    <div class="fp-overlay"></div>

    <!-- Logo -->
    <div class="fp-logo-row">
      <img src="assets/images/catering-logo.png" alt="Catering ERP" class="fp-logo-img"/>
      <div class="fp-logo-divider"></div>
      <div class="fp-logo-text">
        <span>CATERING <em>ERP</em></span>
        <small>Smart. Efficient. Global.</small>
      </div>
    </div>
    <div class="fp-accent"></div>

    <!-- Lock icon -->
    <div class="fp-icon-wrap">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="54" stroke="rgba(56,178,200,0.55)" stroke-width="1.5" stroke-dasharray="6 4"/>
        <circle cx="60" cy="60" r="42" fill="rgba(56,178,200,0.08)" stroke="rgba(56,178,200,0.30)" stroke-width="1.5"/>
        <path d="M40 54a20 20 0 1 1 40 0v6H40v-6z" stroke="rgba(56,178,200,0.90)" stroke-width="2.2" fill="rgba(56,178,200,0.15)" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="34" y="60" width="52" height="32" rx="6" stroke="rgba(56,178,200,0.90)" stroke-width="2.2" fill="rgba(56,178,200,0.12)"/>
        <circle cx="60" cy="76" r="4.5" fill="rgba(56,178,200,0.95)"/>
        <path d="M60 80.5v5" stroke="rgba(56,178,200,0.95)" stroke-width="2.5" stroke-linecap="round"/>
        <!-- corner dots -->
        <circle cx="6"  cy="60" r="3" fill="rgba(56,178,200,0.60)"/>
        <circle cx="114" cy="60" r="3" fill="rgba(56,178,200,0.60)"/>
        <circle cx="60" cy="6"  r="3" fill="rgba(56,178,200,0.60)"/>
        <circle cx="60" cy="114" r="3" fill="rgba(56,178,200,0.60)"/>
      </svg>
    </div>

    <!-- Heading -->
    <h2 class="fp-title">Forgot your <em>password?</em></h2>
    <p class="fp-sub">No worries! Enter your email and we'll send you a reset link.</p>
  </div>

  <!-- ═══ RIGHT PANEL ═══ -->
  <div class="fp-right">
    <div class="fp-card">

      <h1 class="fp-card-title">Reset Password</h1>
      <div class="fp-card-accent"></div>
      <p class="fp-card-sub">Enter your registered email address</p>

      <form (ngSubmit)="onSubmit()" autocomplete="off">

        <div class="f-group">
          <label class="f-label">Email Address</label>
          <div class="f-control" [class.is-error]="submitted && !email.trim()">
            <div class="f-icon">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <rect x="2" y="5" width="16" height="12" rx="2"/>
                <path d="M2 7l8 5 8-5"/>
              </svg>
            </div>
            <input type="email" [(ngModel)]="email" name="email"
                   placeholder="Enter your email address"
                   autocomplete="email"/>
          </div>
          <div class="f-err-msg" *ngIf="submitted && !email.trim()">Email is required</div>
          <p class="f-helper">We'll send you a link to reset your password.</p>
        </div>

        <button type="submit" class="f-submit" [disabled]="loading">
          <span class="btn-spinner" *ngIf="loading"></span>
          <svg *ngIf="!loading" class="btn-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="2" y1="10" x2="18" y2="10"/>
            <path d="M18 10 L12 4 M18 10 L12 16"/>
            <path d="M2 7 L10 10 L2 13 Z" fill="currentColor" stroke="none"/>
          </svg>
          <span>{{ loading ? 'Sending…' : 'Send Reset Link' }}</span>
        </button>

        <div class="or-row">
          <span class="or-line"></span>
          <span class="or-text">or</span>
          <span class="or-line"></span>
        </div>

        <div class="auth-back">
          <a routerLink="/login">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="12 5 5 10 12 15"/>
            </svg>
            Back to Login
          </a>
        </div>

      </form>
    </div>
  </div>

</div>
