<div class="cp-page">
  <div class="cp-card">

    <div class="cp-head">
      <h1 class="cp-title">Change Password</h1>
      <p class="cp-sub">Update your password securely</p>
    </div>

    <!-- Email (read-only) -->
    <div class="cp-group">
      <label class="cp-label">Email</label>
      <div class="cp-field cp-field--readonly">
        <span class="cp-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <rect x="2" y="5" width="16" height="12" rx="2"/>
            <path d="M2 7l8 5 8-5"/>
          </svg>
        </span>
        <span class="cp-email-val">{{ userEmail }}</span>
      </div>
    </div>

    <!-- Old Password -->
    <div class="cp-group">
      <label class="cp-label">Old Password</label>
      <div class="cp-field" [class.cp-field--error]="submitted && !currentPassword">
        <span class="cp-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <rect x="3" y="9" width="14" height="10" rx="2"/>
            <path d="M6 9V6.5a4 4 0 1 1 8 0V9"/>
          </svg>
        </span>
        <input [type]="showCurrent ? 'text' : 'password'" [(ngModel)]="currentPassword"
               placeholder="Enter old password" class="cp-input"/>
        <button type="button" class="cp-eye" (click)="showCurrent=!showCurrent">
          <svg *ngIf="!showCurrent" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M1 10s3.6-7 9-7 9 7 9 7-3.6 7-9 7-9-7-9-7z"/><circle cx="10" cy="10" r="2.5"/>
          </svg>
          <svg *ngIf="showCurrent" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M14.5 14.5A8.4 8.4 0 0 1 10 16c-5.4 0-9-6-9-6a16 16 0 0 1 4.4-5"/>
            <path d="M8 4.2A8.5 8.5 0 0 1 10 4c5.4 0 9 6 9 6a16 16 0 0 1-1.8 2.7"/>
            <line x1="1" y1="1" x2="19" y2="19"/>
          </svg>
        </button>
      </div>
      <div class="cp-err" *ngIf="submitted && !currentPassword">Old password is required</div>
    </div>

    <!-- New Password -->
    <div class="cp-group">
      <label class="cp-label">New Password</label>
      <div class="cp-field" [class.cp-field--error]="submitted && !newPassword">
        <span class="cp-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <rect x="3" y="9" width="14" height="10" rx="2"/>
            <path d="M6 9V6.5a4 4 0 1 1 8 0V9"/>
          </svg>
        </span>
        <input [type]="showNew ? 'text' : 'password'" [(ngModel)]="newPassword"
               placeholder="Enter new password" class="cp-input"/>
        <button type="button" class="cp-eye" (click)="showNew=!showNew">
          <svg *ngIf="!showNew" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M1 10s3.6-7 9-7 9 7 9 7-3.6 7-9 7-9-7-9-7z"/><circle cx="10" cy="10" r="2.5"/>
          </svg>
          <svg *ngIf="showNew" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M14.5 14.5A8.4 8.4 0 0 1 10 16c-5.4 0-9-6-9-6a16 16 0 0 1 4.4-5"/>
            <path d="M8 4.2A8.5 8.5 0 0 1 10 4c5.4 0 9 6 9 6a16 16 0 0 1-1.8 2.7"/>
            <line x1="1" y1="1" x2="19" y2="19"/>
          </svg>
        </button>
      </div>
      <div class="cp-err" *ngIf="submitted && !newPassword">New password is required</div>
      <div class="cp-err" *ngIf="passwordInvalid">Must include uppercase, lowercase, number and special character (min 6)</div>
    </div>

    <!-- Confirm Password -->
    <div class="cp-group">
      <label class="cp-label">Confirm Password</label>
      <div class="cp-field" [class.cp-field--error]="submitted && !confirmNewPassword">
        <span class="cp-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <rect x="3" y="9" width="14" height="10" rx="2"/>
            <path d="M6 9V6.5a4 4 0 1 1 8 0V9"/>
          </svg>
        </span>
        <input [type]="showConfirm ? 'text' : 'password'" [(ngModel)]="confirmNewPassword"
               placeholder="Re-enter new password" class="cp-input"/>
        <button type="button" class="cp-eye" (click)="showConfirm=!showConfirm">
          <svg *ngIf="!showConfirm" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M1 10s3.6-7 9-7 9 7 9 7-3.6 7-9 7-9-7-9-7z"/><circle cx="10" cy="10" r="2.5"/>
          </svg>
          <svg *ngIf="showConfirm" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M14.5 14.5A8.4 8.4 0 0 1 10 16c-5.4 0-9-6-9-6a16 16 0 0 1 4.4-5"/>
            <path d="M8 4.2A8.5 8.5 0 0 1 10 4c5.4 0 9 6 9 6a16 16 0 0 1-1.8 2.7"/>
            <line x1="1" y1="1" x2="19" y2="19"/>
          </svg>
        </button>
      </div>
      <div class="cp-err" *ngIf="submitted && !confirmNewPassword">Confirm password is required</div>
      <div class="cp-err" *ngIf="passwordMismatch">Passwords do not match</div>
    </div>

    <!-- Actions -->
    <div class="cp-actions">
      <button class="cp-btn cp-btn--cancel" type="button" (click)="cancel()">Cancel</button>
      <button class="cp-btn cp-btn--save" type="button" (click)="onSubmit()" [disabled]="loading">
        <span class="cp-spinner" *ngIf="loading"></span>
        {{ loading ? 'Saving…' : 'Save Password' }}
      </button>
    </div>

  </div>
</div>
