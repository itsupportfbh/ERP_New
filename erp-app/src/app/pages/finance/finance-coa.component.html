<div class="list-page">
  <div class="list-card">

    <!-- Header -->
    <div class="list-card-head">
      <div class="list-card-title-block">
        <div class="list-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
        </div>
        <div>
          <h3 class="list-card-title">Chart of Accounts</h3>
          <p class="list-card-sub">Account hierarchy and structure</p>
        </div>
      </div>
      <div class="list-card-actions">
        <button class="list-add-btn" type="button" (click)="openCreate()" *ngIf="permission?.create">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          Add Account
        </button>
      </div>
    </div>

    <!-- Show entries + Search -->
    <div class="table-search-bar">
      <div class="tsb-left">
        Show
        <select class="tsb-page-select" [(ngModel)]="pageSize">
          <option [ngValue]="10">10</option>
          <option [ngValue]="25">25</option>
          <option [ngValue]="50">50</option>
          <option [ngValue]="9999">All</option>
        </select>
        entries
      </div>
      <input class="table-search-input" type="text" placeholder="Search accounts..." [(ngModel)]="search">
    </div>

    <!-- Loading -->
    <div class="coa-loading" *ngIf="loading">Loading...</div>

    <!-- Table -->
    <div class="coa-table-wrap" *ngIf="!loading">
      <table class="coa-table">
        <thead>
          <tr>
            <th class="th-code">HEAD CODE</th>
            <th class="th-name">HEAD NAME</th>
            <!-- <th class="th-type">TYPE</th> -->
            <th class="th-action">ACTION</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of pagedRows" class="coa-row">
            <td class="td-code">{{ row.headCode }}</td>
            <td class="td-name">
              <div class="name-wrap" [style.paddingLeft]="indentPx(row)">
                <button class="toggle-btn"
                        *ngIf="row._hasChildren"
                        [class.toggle-expanded]="isExpanded(row)"
                        type="button"
                        (click)="toggle(row)">
                  {{ isExpanded(row) ? '−' : '+' }}
                </button>
                <span class="toggle-leaf" *ngIf="!row._hasChildren">·</span>
                <span class="acct-label" [class.parent-label]="!row._parentId || row._parentId === 0">
                  {{ row.headName }}
                </span>
              </div>
            </td>
            <!-- <td class="td-type">{{ row.headType || '—' }}</td> -->
            <td class="td-action">
              <button class="icon-btn edit-icon" type="button" (click)="openEdit(row)" title="Edit" *ngIf="permission?.edit">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="icon-btn del-icon" type="button" (click)="delete(row)" title="Delete" *ngIf="permission?.delete">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </td>
          </tr>
          <tr *ngIf="pagedRows.length === 0 && !loading">
            <td colspan="4" class="coa-empty">No accounts found.</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- Modal Backdrop -->
<div class="coa-backdrop" *ngIf="showForm" (click)="showForm = false"></div>

<!-- Create / Edit Modal -->
<div class="coa-modal" *ngIf="showForm">
  <div class="coa-modal-head">
    <span>{{ editRow ? 'Edit Chart Of Account' : 'New Chart Of Account' }}</span>
    <button class="coa-modal-x" type="button" (click)="showForm = false">&#215;</button>
  </div>
  <div class="coa-modal-body">
    <div class="coa-alert coa-danger" *ngIf="error">{{ error }}</div>
    <label class="coa-field">
      <span>Head Name <span class="req">*</span></span>
      <input type="text" [(ngModel)]="form.headName" placeholder="Enter Head Name">
    </label>
    <label class="coa-field">
      <span>Head Code</span>
      <input type="text" [(ngModel)]="form.headCode"
             [readonly]="!editRow" [class.coa-readonly]="!editRow"
             placeholder="Auto Generated">
    </label>
    <label class="coa-field">
      <span>Parent Head</span>
      <!-- erp-dropdown so a long chart of accounts can be searched by code or name. -->
      <erp-dropdown [(ngModel)]="form.parentHead" [options]="parentHeadOptions"
                    placeholder="Search / choose Parent Head..."
                    (ngModelChange)="onParentHeadChange()"></erp-dropdown>
    </label>
    <label class="coa-field">
      <span>P Head Name</span>
      <input type="text" [value]="form.pHeadName ?? ''" readonly class="coa-readonly">
    </label>
    <div class="coa-row-2">
      <label class="coa-field">
        <span>Head Level</span>
        <input type="text" [value]="form.headLevel ?? ''" readonly class="coa-readonly">
      </label>
      <label class="coa-field">
        <span>Head Type</span>
        <input type="text" [value]="form.headType ?? ''" readonly class="coa-readonly">
      </label>
    </div>
    <div class="coa-row-checks">
      <label class="coa-check">
        <span>Is Transaction</span>
        <input type="checkbox" [(ngModel)]="form.isTransaction">
      </label>
      <label class="coa-check">
        <span>Is Gl</span>
        <input type="checkbox" [(ngModel)]="form.isGl">
      </label>
    </div>
    <label class="coa-field" *ngIf="form.isGl">
      <span>Finance Account Type</span>
      <select [(ngModel)]="form.systemAccountType">
        <option *ngFor="let opt of systemAccountOptions" [value]="opt.value">{{ opt.label }}</option>
      </select>
      <small class="coa-hint" *ngIf="form.systemAccountType">
        This account will be used as the company's
        {{ form.systemAccountType === 'cash' ? 'Cash Account' : 'Advance Payment Account' }}
        in GL and Trial Balance.
      </small>
    </label>
  </div>
  <div class="coa-modal-foot">
    <button class="coa-save-btn" type="button" (click)="save()" [disabled]="saving">
      {{ saving ? 'Saving...' : 'Save' }}
    </button>
    <button class="coa-cancel-btn" type="button" (click)="showForm = false">Cancel</button>
  </div>
</div>
