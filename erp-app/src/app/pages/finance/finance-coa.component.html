<div class="coa-page">

  <!-- Header -->
  <div class="coa-head">
    <div class="coa-head-left">
      <div class="coa-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </div>
      <div>
        <h2>Chart of Accounts</h2>
        <p>Account hierarchy and structure</p>
      </div>
    </div>
    <button class="coa-add-btn" type="button" (click)="openCreate()">+ Add</button>
  </div>

  <!-- Alerts -->
  <div class="coa-alert coa-success" *ngIf="message">{{ message }}</div>
  <div class="coa-alert coa-danger"  *ngIf="error">{{ error }}</div>

  <!-- Form Card -->
  <div class="coa-form-card" *ngIf="showForm">
    <div class="coa-form-head">
      <strong>{{ editRow ? 'Edit Account' : 'New Account' }}</strong>
      <button class="coa-outline-btn" type="button" (click)="showForm = false">&#215; Close</button>
    </div>
    <div class="coa-form-grid">
      <label class="coa-field">
        <span>Head Code <span class="req">*</span></span>
        <input type="number" [(ngModel)]="form.headCode" placeholder="e.g. 1001">
      </label>
      <label class="coa-field">
        <span>Head Name <span class="req">*</span></span>
        <input type="text" [(ngModel)]="form.headName" placeholder="Account name">
      </label>
      <label class="coa-field">
        <span>Head Type</span>
        <select [(ngModel)]="form.headType">
          <option value="">— Select —</option>
          <option *ngFor="let t of accountTypes" [value]="t">{{ t }}</option>
        </select>
      </label>
      <label class="coa-field">
        <span>Parent Account</span>
        <select [(ngModel)]="form.parentHead">
          <option [ngValue]="null">— None (Top Level) —</option>
          <option *ngFor="let p of rows" [ngValue]="p.id">{{ p.headCode }} – {{ p.headName }}</option>
        </select>
      </label>
    </div>
    <div class="coa-form-footer">
      <button class="coa-outline-btn" type="button" (click)="showForm = false">Cancel</button>
      <button class="coa-add-btn" type="button" (click)="save()" [disabled]="saving">
        {{ saving ? 'Saving...' : (editRow ? 'Update' : 'Save') }}
      </button>
    </div>
  </div>

  <!-- Controls: Show entries (left) + Search (right) -->
  <div class="coa-controls">
    <div class="coa-show-row">
      <span>Show</span>
      <div class="coa-select-wrap">
        <select [(ngModel)]="pageSize">
          <option [value]="10">10</option>
          <option [value]="25">25</option>
          <option [value]="50">50</option>
          <option [value]="9999">All</option>
        </select>
        <span class="select-arrow">&#9660;</span>
      </div>
      <span>entries</span>
    </div>
    <div class="coa-search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="coa-search" type="text" placeholder="Search accounts..." [(ngModel)]="search">
    </div>
  </div>

  <!-- Table Card -->
  <div class="coa-table-card">
    <div class="coa-loading" *ngIf="loading">Loading...</div>
    <div class="coa-table-wrap" *ngIf="!loading">
      <table class="coa-table">
        <thead>
          <tr>
            <th class="th-code">HEAD CODE</th>
            <th class="th-name">HEAD NAME</th>
            <th class="th-action">ACTION</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of pagedRows" class="coa-row">
            <td class="td-code">{{ row.headCode }}</td>
            <td class="td-name">
              <div class="name-wrap" [style.paddingLeft]="indentPx(row)">
                <button class="toggle-btn"
                        [class.toggle-expanded]="isExpanded(row)"
                        type="button"
                        (click)="row._hasChildren ? toggle(row) : null">
                  {{ row._hasChildren && isExpanded(row) ? '−' : '+' }}
                </button>
                <span class="acct-label" [class.parent-label]="!row._parentId || row._parentId === 0">
                  {{ row.headName }}
                </span>
              </div>
            </td>
            <td class="td-action">
              <button class="icon-btn edit-icon" type="button" (click)="openEdit(row)" title="Edit">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="icon-btn del-icon" type="button" (click)="delete(row)" title="Delete">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </td>
          </tr>
          <tr *ngIf="pagedRows.length === 0 && !loading">
            <td colspan="3" class="coa-empty">No accounts found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
