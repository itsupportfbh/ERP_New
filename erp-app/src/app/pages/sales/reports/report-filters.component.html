<div class="rf-overlay" *ngIf="open" (click)="onCancel()">
  <div class="rf-panel" (click)="$event.stopPropagation()">
    <div class="rf-head">
      <h3>Filters</h3>
      <button class="rf-close" (click)="onCancel()" aria-label="Close">×</button>
    </div>

    <div class="rf-body">
      <div class="rf-group">
        <label class="rf-label">Date Range</label>
        <erp-dropdown [(ngModel)]="model.dateRange" name="dateRange"
          [items]="dateRangeOptions" bindLabel="label" bindValue="value"></erp-dropdown>
      </div>

      <div class="rf-row" *ngIf="model.dateRange === 'custom'">
        <div class="rf-group">
          <label class="rf-label">From</label>
          <input class="rf-input" type="date" [(ngModel)]="model.fromDate" name="fromDate"/>
        </div>
        <div class="rf-group">
          <label class="rf-label">To</label>
          <input class="rf-input" type="date" [(ngModel)]="model.toDate" name="toDate"/>
        </div>
      </div>

      <div class="rf-group" *ngIf="showCustomer">
        <label class="rf-label">Customer</label>
        <erp-dropdown [(ngModel)]="model.customerId" name="customerId"
          [items]="customers" bindLabel="name" bindValue="id"
          placeholder="All Customers"></erp-dropdown>
      </div>

      <div class="rf-group" *ngIf="showBranch">
        <label class="rf-label">Branch / Location</label>
        <erp-dropdown [(ngModel)]="model.branchId" name="branchId"
          [items]="branches" bindLabel="name" bindValue="id"
          placeholder="All Branches"></erp-dropdown>
      </div>

      <div class="rf-group" *ngIf="showSalesperson">
        <label class="rf-label">Salesperson</label>
        <erp-dropdown [(ngModel)]="model.salespersonId" name="salespersonId"
          [items]="salespersons" bindLabel="name" bindValue="id"
          placeholder="All Salespersons"></erp-dropdown>
      </div>

      <div class="rf-group" *ngIf="showCategory">
        <label class="rf-label">Category</label>
        <erp-dropdown [(ngModel)]="model.categoryId" name="categoryId"
          [items]="categories" bindLabel="name" bindValue="id"
          placeholder="All Categories"></erp-dropdown>
      </div>

      <div class="rf-group" *ngIf="showStatus">
        <label class="rf-label">Status</label>
        <erp-dropdown [(ngModel)]="model.status" name="status"
          [items]="statuses" bindLabel="label" bindValue="value"
          placeholder="All Statuses"></erp-dropdown>
      </div>
    </div>

    <div class="rf-foot">
      <button class="rf-btn reset" (click)="onReset()">Reset</button>
      <button class="rf-btn cancel" (click)="onCancel()">Cancel</button>
      <button class="rf-btn apply" (click)="onApply()">Apply</button>
    </div>
  </div>
</div>
