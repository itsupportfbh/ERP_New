<div class="rf-overlay" *ngIf="open" (click)="onCancel()">
  <div class="rf-panel" (click)="$event.stopPropagation()">
    <div class="rf-head">
      <h3>Filters</h3>
      <button class="rf-close" (click)="onCancel()" aria-label="Close">×</button>
    </div>

    <div class="rf-body">
      <div class="rf-group">
        <label class="rf-label">Date Range</label>
        <select class="rf-input" [(ngModel)]="model.dateRange" name="dateRange">
          <option *ngFor="let o of dateRangeOptions" [value]="o.value">{{ o.label }}</option>
        </select>
      </div>

      <div class="rf-row" *ngIf="model.dateRange === 'custom'">
        <div class="rf-group">
          <label class="rf-label">From</label>
          <input class="rf-input" type="date" [(ngModel)]="model.fromDate" name="fromDate"/>
        </div>
        <div class="rf-group">
          <label class="rf-label">To</label>
          <input class="rf-input" type="date" [(ngModel)]="model.toDate" name="toDate"/>
        </div>
      </div>

      <div class="rf-group" *ngIf="showCustomer">
        <label class="rf-label">Customer</label>
        <select class="rf-input" [(ngModel)]="model.customerId" name="customerId">
          <option [ngValue]="null">All Customers</option>
          <option *ngFor="let c of customers" [value]="c.id">{{ c.name }}</option>
        </select>
      </div>

      <div class="rf-group" *ngIf="showBranch">
        <label class="rf-label">Branch / Location</label>
        <select class="rf-input" [(ngModel)]="model.branchId" name="branchId">
          <option [ngValue]="null">All Branches</option>
          <option *ngFor="let b of branches" [value]="b.id">{{ b.name }}</option>
        </select>
      </div>

      <div class="rf-group" *ngIf="showSalesperson">
        <label class="rf-label">Salesperson</label>
        <select class="rf-input" [(ngModel)]="model.salespersonId" name="salespersonId">
          <option [ngValue]="null">All Salespersons</option>
          <option *ngFor="let s of salespersons" [value]="s.id">{{ s.name }}</option>
        </select>
      </div>

      <div class="rf-group" *ngIf="showCategory">
        <label class="rf-label">Category</label>
        <select class="rf-input" [(ngModel)]="model.categoryId" name="categoryId">
          <option [ngValue]="null">All Categories</option>
          <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
        </select>
      </div>

      <div class="rf-group" *ngIf="showStatus">
        <label class="rf-label">Status</label>
        <select class="rf-input" [(ngModel)]="model.status" name="status">
          <option [ngValue]="null">All Statuses</option>
          <option *ngFor="let s of statuses" [value]="s.value">{{ s.label }}</option>
        </select>
      </div>
    </div>

    <div class="rf-foot">
      <button class="rf-btn reset" (click)="onReset()">Reset</button>
      <button class="rf-btn cancel" (click)="onCancel()">Cancel</button>
      <button class="rf-btn apply" (click)="onApply()">Apply</button>
    </div>
  </div>
</div>
