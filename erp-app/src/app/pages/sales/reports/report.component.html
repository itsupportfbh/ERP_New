<div class="rp-page">
  <div class="rp-grid">
    <div class="rp-card" *ngFor="let r of visibleReports" [class.active]="isActive(r)">
      <div class="rp-left">
        <div class="rp-icon" [ngSwitch]="r.key">
          <svg *ngSwitchCase="'SALES_BY_ITEM'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
          <svg *ngSwitchCase="'AVG_MARGIN'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          <svg *ngSwitchCase="'DELIVERIES'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <svg *ngSwitchDefault viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
        </div>
        <div class="rp-text">
          <div class="rp-title">{{ r.name }}</div>
          <div class="rp-sub">{{ r.crumb }}</div>
        </div>
      </div>
      <button class="rp-open" type="button" (click)="openReport(r)">{{ isActive(r) ? 'Viewing' : 'Open' }}</button>
    </div>
  </div>

  <div class="rp-detail" *ngIf="activeReport">
    <erp-dynamic-report [def]="activeReport"></erp-dynamic-report>
  </div>
</div>
