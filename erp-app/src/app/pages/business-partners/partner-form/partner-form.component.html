<div class="page-container">
  <div class="page-header">
    <div class="header-left">
      <button class="btn btn-outline btn-sm" (click)="back()">&#8592; Back</button>
      <h2>{{ title }}</h2>
    </div>
    <div class="btn-group">
      <button class="btn btn-outline btn-sm" (click)="back()">Cancel</button>
      <button class="btn btn-primary btn-sm" [disabled]="saving || loading" (click)="save()">&#10003; Save</button>
    </div>
  </div>

  <div class="form-scroll">
    <div class="error-text" *ngIf="error">{{ error }}</div>

  <!-- Stepper -->
  <div class="cstep-bar" *ngIf="type === 'customers'">
    <div class="cstep" [class.cstep-active]="customerStep === 1" [class.cstep-done]="customerStep > 1" (click)="customerStep = 1">
      <div class="cstep-circle">
        <svg *ngIf="customerStep > 1" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="4 10 8 14 16 6"/></svg>
        <span *ngIf="customerStep <= 1">1</span>
      </div>
      <span class="cstep-label">Account</span>
    </div>
    <div class="cstep-line" [class.cstep-line-done]="customerStep > 1"></div>
    <div class="cstep" [class.cstep-active]="customerStep === 2" [class.cstep-done]="customerStep > 2" (click)="customerStep >= 2 && (customerStep = 2)">
      <div class="cstep-circle">
        <svg *ngIf="customerStep > 2" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="4 10 8 14 16 6"/></svg>
        <span *ngIf="customerStep <= 2">2</span>
      </div>
      <span class="cstep-label">Commercial</span>
    </div>
    <div class="cstep-line" [class.cstep-line-done]="customerStep > 2"></div>
    <div class="cstep" [class.cstep-active]="customerStep === 3" (click)="customerStep >= 3 && (customerStep = 3)">
      <div class="cstep-circle"><span>3</span></div>
      <span class="cstep-label">KYC</span>
    </div>
  </div>

  <div class="card section-card" *ngIf="type === 'customers' && customerStep === 1">
    <div class="section-label">Account Details</div>
    <div class="form-row cols-3">
      <erp-input label="Customer Name" [required]="true" [(ngModel)]="customer.customerName"></erp-input>
      <erp-dropdown label="Country" [required]="true" [options]="countryOptions" [(ngModel)]="customer.countryId"
        [allowAdd]="true" addTypeLabel="Country" (addNew)="openQuickCountry($event)"></erp-dropdown>
      <erp-dropdown label="Ledger Name" [options]="ledgerOptions" [menuMinWidth]="560" [(ngModel)]="customer.budgetLineId"></erp-dropdown>
    </div>
    <!-- The point of contact is a per-JOB fact, not a per-customer one: the same caterer deals with a
         different person for each event. It is captured on the quotation now. -->
    <div class="form-row cols-2 block-gap">
      <erp-input label="Email" type="email" [(ngModel)]="customer.email"></erp-input>
      <erp-input label="Contact Number" [(ngModel)]="customer.phone"></erp-input>
    </div>
    <label class="textarea-field block-gap">
      <span>Address</span>
      <textarea [(ngModel)]="customer.address" rows="2"></textarea>
    </label>
    <div class="wizard-inline-actions">
      <button class="btn btn-primary btn-sm" (click)="nextCustomerStep()">Next</button>
    </div>
  </div>

  <div class="card section-card" *ngIf="type === 'customers' && customerStep === 2">
    <div class="section-label">Personal Info</div>
    <div class="form-row cols-3">
      <erp-dropdown label="Customer Groups" [options]="customerGroupOptions" [(ngModel)]="customer.customerGroupId"></erp-dropdown>
      <erp-dropdown label="Payment Terms" [options]="paymentTermOptions" [(ngModel)]="customer.paymentTermId"></erp-dropdown>
      <erp-input label="Credit Amount" type="number" [(ngModel)]="customer.creditAmount"></erp-input>
    </div>
    <div class="wizard-inline-actions">
      <button class="btn btn-outline btn-sm" (click)="prevCustomerStep()">Back</button>
      <button class="btn btn-primary btn-sm" (click)="nextCustomerStep()">Next</button>
    </div>
  </div>

  <div class="card section-card" *ngIf="type === 'customers' && customerStep === 3">
    <div class="kyc-head">
      <div class="section-label" style="margin-bottom:0">Know Your Customer (KYC) Verification</div>
      <span class="kyc-approved-badge" *ngIf="kycLocked">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="4 10 8 14 16 6"/></svg>
        Already Approved
      </span>
    </div>
    <div class="kyc-wrap">
      <div class="kyc-grid" [class.kyc-grid-locked]="kycLocked">
        <label class="file-card">
          <span>Passport</span>
          <div class="file-card-body">
            <img *ngIf="kycPreview.drivingLicence" [src]="kycPreview.drivingLicence" alt="">
            <div *ngIf="!kycPreview.drivingLicence" class="file-placeholder">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28"><path d="M10 3v10M6 7l4-4 4 4"/><rect x="3" y="14" width="14" height="4" rx="1"/></svg>
              <span>Click or drop file here</span>
            </div>
          </div>
          <input type="file" accept="image/*" [disabled]="kycLocked" (change)="onKycFile($event, 'drivingLicence')">
        </label>
        <label class="file-card">
          <span>IC</span>
          <div class="file-card-body">
            <img *ngIf="kycPreview.utilityBill" [src]="kycPreview.utilityBill" alt="">
            <div *ngIf="!kycPreview.utilityBill" class="file-placeholder">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28"><path d="M10 3v10M6 7l4-4 4 4"/><rect x="3" y="14" width="14" height="4" rx="1"/></svg>
              <span>Click or drop file here</span>
            </div>
          </div>
          <input type="file" accept="image/*" [disabled]="kycLocked" (change)="onKycFile($event, 'utilityBill')">
        </label>
        <label class="file-card">
          <span>Bank Statement</span>
          <div class="file-card-body">
            <img *ngIf="kycPreview.bankStatement" [src]="kycPreview.bankStatement" alt="">
            <div *ngIf="!kycPreview.bankStatement" class="file-placeholder">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28"><path d="M10 3v10M6 7l4-4 4 4"/><rect x="3" y="14" width="14" height="4" rx="1"/></svg>
              <span>Click or drop file here</span>
            </div>
          </div>
          <input type="file" accept="image/*" [disabled]="kycLocked" (change)="onKycFile($event, 'bankStatement')">
        </label>
        <label class="file-card">
          <span>Company Registration (ACRA)</span>
          <div class="file-card-body">
            <img *ngIf="kycPreview.acra" [src]="kycPreview.acra" alt="">
            <div *ngIf="!kycPreview.acra" class="file-placeholder">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28"><path d="M10 3v10M6 7l4-4 4 4"/><rect x="3" y="14" width="14" height="4" rx="1"/></svg>
              <span>Click or drop file here</span>
            </div>
          </div>
          <input type="file" accept="image/*" [disabled]="kycLocked" (change)="onKycFile($event, 'acra')">
        </label>
      </div>
      <!-- Approved overlay -->
      <div class="kyc-locked-overlay" *ngIf="kycLocked">
        <div class="kyc-lock-badge">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16">
            <rect x="4" y="9" width="12" height="9" rx="1"/>
            <path d="M7 9V7a3 3 0 016 0v2"/>
          </svg>
          KYC is Already Approved
        </div>
      </div>
    </div>
    <div class="form-row cols-4 block-gap">
      <erp-dropdown label="Approved By" [disabled]="kycLocked" [options]="approvalLevelOptions" [(ngModel)]="customer.approvedBy"></erp-dropdown>
    </div>
    <div class="wizard-inline-actions">
      <button class="btn btn-outline btn-sm" (click)="prevCustomerStep()">Back</button>
    </div>
  </div>

  <div class="card section-card" *ngIf="type === 'suppliers'">
    <div class="section-label">Supplier Details</div>
    <div class="supplier-grid">
      <erp-input label="Supplier Name" [required]="true" [(ngModel)]="supplier.name"></erp-input>
      <erp-dropdown label="Country" [options]="countryOptions" [(ngModel)]="supplier.countryId"></erp-dropdown>
      <erp-dropdown label="Status" [options]="statusOptions" [(ngModel)]="supplier.statusId"></erp-dropdown>
      <erp-input label="Lead Time (days)" type="number" [(ngModel)]="supplier.leadTime"></erp-input>

      <erp-dropdown label="Payment Terms" [options]="paymentTermOptions" [(ngModel)]="supplier.termsId"></erp-dropdown>
      <erp-dropdown label="Currency" [options]="currencyOptions" [(ngModel)]="supplier.currencyId" (ngModelChange)="onSupplierCurrencyChange($event)"></erp-dropdown>
      <erp-dropdown label="Incoterms" [options]="incotermOptions" [(ngModel)]="supplier.incotermsId"></erp-dropdown>

      <erp-dropdown label="Ledger Name / Account" [options]="ledgerOptions" [menuMinWidth]="560" [(ngModel)]="supplier.budgetLineId"></erp-dropdown>
      <erp-input label="Contact Name" [(ngModel)]="supplier.contact"></erp-input>
      <erp-input label="Email" type="email" [(ngModel)]="supplier.email"></erp-input>
      <erp-input label="Phone" [(ngModel)]="supplier.phone"></erp-input>

      <div class="supplier-span-2">
        <erp-multiselect label="Preferred Items" [options]="itemOptions" [(ngModel)]="supplierPreferredItemIds"></erp-multiselect>
      </div>
      <label class="textarea-field supplier-span-2">
        <span>Address</span>
        <textarea [(ngModel)]="supplier.address" rows="3"></textarea>
      </label>
    </div>
  </div>

  <div class="card section-card" *ngIf="type === 'suppliers'">
    <div class="section-label">Bank &amp; Compliance</div>
    <div class="form-row cols-4">
      <erp-input label="Bank Name" [(ngModel)]="supplier.bankName"></erp-input>
      <erp-input label="Account No" [(ngModel)]="supplier.bankAcc"></erp-input>
      <erp-input label="SWIFT/IFSC" [(ngModel)]="supplier.bankSwift"></erp-input>
      <erp-input label="Branch" [(ngModel)]="supplier.bankBranch"></erp-input>
    </div>
    <div class="docs-list block-gap">
      <div class="doc-row" *ngFor="let doc of supplierDocs; let i = index">
        <erp-input label="Document" [(ngModel)]="doc.name"></erp-input>
        <erp-input label="Number" [(ngModel)]="doc.number"></erp-input>
        <erp-input label="Expiry" type="date" [(ngModel)]="doc.expiry"></erp-input>
        <label class="doc-upload">
          <span>Upload</span>
          <div class="doc-upload-box">
            <span class="doc-upload-trigger">Choose files</span>
            <span class="doc-upload-text" [class.has-files]="doc.files.length">
              {{ doc.files.length ? (doc.files.length + ' file(s) selected') : 'No files chosen' }}
            </span>
          </div>
          <input type="file" multiple (change)="onSupplierDocFiles($event, i)">
        </label>
        <button class="btn btn-outline btn-sm" type="button" (click)="removeSupplierDoc(i)">Remove</button>
        <div class="file-chip-row" *ngIf="doc.files.length">
          <button class="file-chip" type="button" *ngFor="let file of doc.files; let fileIndex = index" (click)="removeSupplierDocFile(i, fileIndex)">
            {{ file.name }} x
          </button>
        </div>
      </div>
      <button class="btn btn-outline btn-sm add-doc-btn" type="button" (click)="addSupplierDoc()">+ Add document</button>
    </div>
  </div>

  <!-- User Details -->
  <div class="card section-card" *ngIf="type === 'users'">
    <div class="section-label">User Details</div>
    <div class="form-row cols-4">
      <erp-input label="Username" [required]="true" [(ngModel)]="user.username"></erp-input>
      <erp-input label="Email" type="email" [required]="true" [(ngModel)]="user.email"></erp-input>
      <erp-input
        label="Password"
        type="password"
        [required]="!isEdit"
        [placeholder]="isEdit ? 'Leave blank to keep current' : ''"
        [(ngModel)]="user.password">
      </erp-input>
      <erp-dropdown
        label="Status"
        [options]="userStatusOptions"
        [(ngModel)]="user.isActive">
      </erp-dropdown>
    </div>

    <div class="form-row cols-2 block-gap">
      <erp-dropdown
        label="Department"
        placeholder="Select department"
        [required]="true"
        [options]="departmentOptions"
        [(ngModel)]="user.departmentId">
      </erp-dropdown>
      <erp-dropdown
        label="Location"
        placeholder="Select location"
        [required]="true"
        [options]="locationOptions"
        [(ngModel)]="user.locationId">
      </erp-dropdown>
    </div>
  </div>

  <!-- Roles & Permissions -->
  <div class="card section-card" *ngIf="type === 'users'">
    <div class="section-label">Roles &amp; Permissions</div>
    <p class="section-hint" *ngIf="approvalLevelOptions.length === 0">
      Loading approval levels…
    </p>
    <div class="roles-grid" *ngIf="approvalLevelOptions.length > 0">
      <label class="role-item" *ngFor="let opt of approvalLevelOptions"
             [class.role-selected]="user.approvalLevelIds && user.approvalLevelIds.includes(+opt.value)"
             (click)="toggleRole(+opt.value)">
        <span class="role-check">
          <svg *ngIf="user.approvalLevelIds && user.approvalLevelIds.includes(+opt.value)"
               viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1.5,5 3.8,7.5 8.5,2"/>
          </svg>
        </span>
        <span class="role-name">{{ opt.label }}</span>
      </label>
  </div>
  </div>

  <!-- Inline Quick-Add Country popup -->
  <div class="dt-modal-overlay" *ngIf="showQuickCountry" (click)="closeQuickCountry()">
    <div class="dt-modal" style="width:440px" (click)="$event.stopPropagation()">
      <div class="dt-modal-title">Add Country</div>
      <div class="form-row cols-2">
        <erp-input label="Country Name" [required]="true" [(ngModel)]="quickCountry.name"></erp-input>
        <erp-input label="Tax Name (e.g. GST/SST)" [(ngModel)]="quickCountry.taxName"></erp-input>
      </div>
      <div class="form-row cols-2 block-gap">
        <erp-input label="Tax %" type="number" [(ngModel)]="quickCountry.gstPct"></erp-input>
        <erp-input label="Currency Symbol (e.g. RM)" [(ngModel)]="quickCountry.currencySymbol"></erp-input>
      </div>
      <div class="mf-actions">
        <button class="btn btn-outline btn-sm" type="button" (click)="closeQuickCountry()">Cancel</button>
        <button class="btn btn-primary btn-sm" type="button" [disabled]="quickCountrySaving" (click)="saveQuickCountry()">
          {{ quickCountrySaving ? 'Saving…' : 'Add & Select' }}
        </button>
      </div>
    </div>
  </div>
</div>
