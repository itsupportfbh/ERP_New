<div class="page-container">
  <div class="page-header">
    <button class="btn btn-primary btn-sm" *ngIf="canCreate()" (click)="create()">
      + New {{ activeTab === 'customers' ? 'Customer' : activeTab === 'suppliers' ? 'Supplier' : 'User' }}
    </button>
  </div>

  <div class="card filter-bar">
    <div class="form-row cols-3">
      <erp-input
        label="Search"
        [placeholder]="activeTab === 'customers' ? 'Customer name / email / phone...' : activeTab === 'suppliers' ? 'Supplier name / email / phone...' : 'Username / email / role...'"
        [(ngModel)]="filter.search"
        (ngModelChange)="onSearch()">
      </erp-input>
    </div>
    <div class="error-text" *ngIf="error">{{ error }}</div>
  </div>

  <div class="card table-section">
    <erp-table
      [columns]="columns"
      [data]="tableData"
      [loading]="loading"
      [rowKey]="rowKey"
      [rowActions]="rowActions"
      rowActionsHeader="Action"
      (rowClick)="onRowClick($event)"
      (actionClick)="onActionClick($event)"
      (sortChange)="onSort($event)">
    </erp-table>
    <erp-pager
      [totalItems]="allData.length"
      [pageSize]="pageSize"
      [currentPage]="currentPage"
      (pageChange)="onPage($event)"
      (pageSizeChange)="onPageSize($event)">
    </erp-pager>
  </div>
</div>
