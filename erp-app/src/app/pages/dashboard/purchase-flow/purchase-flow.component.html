<div class="section-card half-width">
  <h6 class="section-title">Purchase Flow &nbsp;·&nbsp; PR → PO → GRN → PIN</h6>

  <div class="ov-row" *ngFor="let item of purchaseFlow">
    <span>{{ item.name }} ({{ item.count }})</span>
    <div class="prog-wrap"><div class="prog-fill teal" [style.width.%]="item.percentage"></div></div>
    <span class="prog-pct">{{ item.percentage }}%</span>
  </div>

  <div class="ov-row" *ngIf="!purchaseFlow.length">
    <span class="no-data">Loading...</span>
  </div>
</div>
