<div class="section-card">
  <div class="section-title">Quick Stats</div>

  <div class="kpi-grid">

    <div class="kpi-card blue-card">
      <div class="kpi-icon blue-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
      </div>
      <div class="kpi-title">Receipts Today</div>
      <div class="kpi-value">{{ receiptsToday }}</div>
      <div class="kpi-footer"><span class="mr-sub">GRN entries</span></div>
    </div>

    <div class="kpi-card orange-card">
      <div class="kpi-icon orange-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <div class="kpi-title">Issues Today</div>
      <div class="kpi-value">{{ issuesToday }}</div>
      <div class="kpi-footer"><span class="mr-sub">Stock issues</span></div>
    </div>

    <div class="kpi-card teal-card">
      <div class="kpi-icon teal-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </div>
      <div class="kpi-title">Transfers</div>
      <div class="kpi-value">{{ transfers }}</div>
      <div class="kpi-footer"><span class="mr-sub">WH to WH</span></div>
    </div>

    <div class="kpi-card purple-card">
      <div class="kpi-icon purple-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <div class="kpi-title">Adjustments</div>
      <div class="kpi-value">{{ adjustments }}</div>
      <div class="kpi-footer"><span class="mr-sub">Manual adj.</span></div>
    </div>

  </div>
</div>
