<div class="section-card">
  <h6 class="section-title">System-Wide Exceptions</h6>

  <div class="table-wrap">
    <table class="dash-table">
      <thead>
        <tr>
          <th>Severity</th>
          <th>Type</th>
          <th>Module</th>
          <th>Document</th>
          <th>Party</th>
          <th>Impact</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of exceptions">
          <td>
            <span [ngClass]="item.level === 'high' ? 'badge-sm-danger' : 'badge-sm-warn'">
              {{ item.severity }}
            </span>
          </td>
          <td>{{ item.type }}</td>
          <td>{{ item.module }}</td>
          <td>{{ item.document }}</td>
          <td>{{ item.party }}</td>
          <td>{{ item.impact }}</td>
        </tr>
        <tr *ngIf="exceptions.length === 0">
          <td colspan="6" class="no-data">No system-wide exceptions</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
