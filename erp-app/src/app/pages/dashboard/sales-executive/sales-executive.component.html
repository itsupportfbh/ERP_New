<div class="kpi-grid">

  <div class="kpi-card blue-card">
    <div class="kpi-icon blue-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    </div>
    <div class="kpi-title">Quotations</div>
    <div class="kpi-value">{{ salesExecutiveData.quotation }}</div>
    <div class="kpi-footer">
      <span class="badge-up">↑ 12% Draft+Approved</span>
    </div>
  </div>

  <div class="kpi-card green-card">
    <div class="kpi-icon green-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    </div>
    <div class="kpi-title">Sales Orders</div>
    <div class="kpi-value">{{ salesExecutiveData.salesOrders }}</div>
    <div class="kpi-footer">
      <span class="badge-up">↑ 8% Open in range</span>
    </div>
  </div>

  <div class="kpi-card teal-card">
    <div class="kpi-icon teal-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
    </div>
    <div class="kpi-title">Deliveries</div>
    <div class="kpi-value">{{ salesExecutiveData.deliveries }}</div>
    <div class="kpi-footer">
      <span class="badge-down">↓ 3% DOs created</span>
    </div>
  </div>

  <div class="kpi-card orange-card">
    <div class="kpi-icon orange-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </div>
    <div class="kpi-title">Invoices</div>
    <div class="kpi-value">{{ salesExecutiveData.invoices }}</div>
    <div class="kpi-footer">
      <span class="badge-up">↑ 15% Posted</span>
    </div>
  </div>

</div>
