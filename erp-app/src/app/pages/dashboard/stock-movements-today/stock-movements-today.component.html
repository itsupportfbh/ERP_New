<div class="section-card">

  <div class="section-title">Stock Movements Today</div>

  <div class="table-wrap">
    <table class="dash-table">
      <thead>
        <tr>
          <th>PR #</th>
          <th>Item</th>
          <th>Qty</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of Stockmovement">
          <td>{{ item.prNo }}</td>
          <td>{{ item.item }}</td>
          <td>{{ item.qty }}</td>
          <td>
            <span [ngClass]="item.class">{{ item.status }}</span>
          </td>
        </tr>
        <tr *ngIf="Stockmovement.length === 0">
          <td colspan="4" class="no-data">No stock movements today</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
