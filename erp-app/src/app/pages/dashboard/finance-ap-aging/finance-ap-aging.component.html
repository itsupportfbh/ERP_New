<div class="section-card half-width">
  <h6 class="section-title">AP Aging (Payables)</h6>
  <table class="dash-table">
    <thead><tr><th>Bucket</th><th>Amount</th></tr></thead>
    <tbody>
      <tr *ngFor="let item of agingData">
        <td>{{ item.period }}</td>
        <td [class.warn-text]="item.overdue">{{ item.amount }}</td>
      </tr>
      <tr *ngIf="!agingData.length"><td colspan="2" class="no-data">Loading...</td></tr>
    </tbody>
  </table>
</div>
