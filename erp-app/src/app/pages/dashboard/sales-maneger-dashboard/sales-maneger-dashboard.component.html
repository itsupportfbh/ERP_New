<div class="kpi-grid">

  <div class="kpi-card teal-card">
    <div class="kpi-icon teal-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>
    <div class="kpi-title">Total Revenue</div>
    <div class="kpi-value">{{ formatCurrency(totalRevenue) }}</div>
    <div class="kpi-footer">
      <span class="badge-up">↑ 18% vs last month</span>
    </div>
  </div>

  <div class="kpi-card blue-card">
    <div class="kpi-icon blue-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <div class="kpi-title">Active Customers</div>
    <div class="kpi-value">{{ activeCustomers }}</div>
    <div class="kpi-footer">
      <span class="badge-up">↑ 6% Billed this month</span>
    </div>
  </div>

  <div class="kpi-card green-card">
    <div class="kpi-icon green-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </div>
    <div class="kpi-title">Avg Deal Size</div>
    <div class="kpi-value">{{ formatCurrency(avgDealSize) }}</div>
    <div class="kpi-footer">
      <span class="badge-up">↑ 11% Per invoice</span>
    </div>
  </div>

  <div class="kpi-card red-card">
    <div class="kpi-icon red-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div class="kpi-title">AR Overdue</div>
    <div class="kpi-value">{{ formatCurrency(arOverdue) }}</div>
    <div class="kpi-footer">
      <span class="badge-down">↓ 4% &gt;30 days</span>
    </div>
  </div>

</div>
