<div class="kpi-grid">

  <!-- Total SKUs -->
  <div class="kpi-card green-card">
    <div class="kpi-icon green-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    </div>
    <div class="kpi-title">Total Items</div>
    <div class="kpi-value">{{ totalSkus }}</div>
    <div class="kpi-footer">
      <span class="badge-sm-success">Active Items</span>
    </div>
  </div>

  <!-- GRN Pending -->
  <div class="kpi-card blue-card">
    <div class="kpi-icon blue-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
    </div>
    <div class="kpi-title">GRN Pending</div>
    <div class="kpi-value">{{ grnPending }}</div>
    <div class="kpi-footer">
      <span class="badge-sm-warn">Awaiting Post</span>
    </div>
  </div>

</div>
