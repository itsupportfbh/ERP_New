<div class="page-container">
  <div class="page-header">
    <h2>Inventory</h2>
    <div class="btn-group">
      <button class="btn btn-primary btn-sm">+ Add Item</button>
      <button class="btn btn-outline btn-sm">&#x2913; Export</button>
    </div>
  </div>

  <div class="card filter-bar">
    <div class="form-row cols-3">
      <erp-input label="Search" placeholder="Item code / name..." [(ngModel)]="filter.search"></erp-input>
      <erp-dropdown label="Category" [options]="categoryOptions" [(ngModel)]="filter.category"></erp-dropdown>
      <erp-multiselect label="Warehouse" [options]="warehouseOptions" placeholder="All warehouses" [(ngModel)]="filter.warehouse"></erp-multiselect>
    </div>
  </div>

  <div class="card table-section">
    <erp-table
      [columns]="columns"
      [data]="tableData"
      [loading]="loading"
      [selectable]="true"
      rowKey="code"
      (sortChange)="onSort($event)">
    </erp-table>
    <erp-pager
      [totalItems]="allData.length"
      [pageSize]="pageSize"
      [currentPage]="currentPage"
      (pageChange)="onPage($event)"
      (pageSizeChange)="onPageSize($event)">
    </erp-pager>
  </div>
</div>
