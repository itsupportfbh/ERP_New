<div class="master-pg">
  <div class="master-wrap" [class.split]="isFormVisible">
    <div class="mcard">
      <div class="mcard-head">
        <div class="mcard-title"><div class="mcard-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10l8-4 8 4-8 4-8-4z"/><path d="M2 14l8 4 8-4"/><path d="M2 6l8 4 8-4"/></svg></div><span>Package List</span></div>
        <button class="mbtn-create" (click)="showForm()" *ngIf="canCreate()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="8"/><line x1="10" y1="6" x2="10" y2="14"/><line x1="6" y1="10" x2="14" y2="10"/></svg> Create</button>
      </div>
      <div class="mcard-body">
        <div class="mlist-loading" *ngIf="loading">Loading...</div>
        <div class="mlist-empty" *ngIf="!loading && items.length===0">No records found.</div>
        <div class="mlist-item" *ngFor="let item of items">
          <div class="mitem-left">
            <div class="mitem-avatar mitem-avatar--img" *ngIf="item.imageUrl; else setIcon">
              <img [src]="imageSrc(item.imageUrl)" [alt]="item.setName || 'Package'" />
            </div>
            <ng-template #setIcon>
              <div class="mitem-avatar"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/><rect x="7" y="4" width="6" height="6" rx="1"/></svg></div>
            </ng-template>
            <div class="mitem-info"><div class="mitem-name">{{ item.setName || item.name }}</div></div>
          </div>
          <div class="mitem-actions">
            <button class="micon-btn edit" (click)="edit(item)" title="Edit" *ngIf="canEdit()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 3l4 4-10 10H3v-4L13 3z"/></svg></button>
            <button class="micon-btn del" (click)="openDelete(item)" title="Delete" *ngIf="canDelete()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="5 7 5 18 15 18 15 7"/><line x1="3" y1="7" x2="17" y2="7"/><path d="M8 7V4h4v3"/></svg></button>
          </div>
        </div>
      </div>
    </div>
    <div class="mform-card" *ngIf="isFormVisible">
      <h3 class="mform-title">{{ isEditMode ? 'Edit' : 'Create' }} Package List</h3>
      <form (ngSubmit)="onSubmit()" #f="ngForm">
        <div class="mf-group"><label class="mf-label">Set Name <span style="color:red">*</span></label><input class="mf-input" type="text" [(ngModel)]="form.setName" name="setName" placeholder="Set Name"/></div>
        <div class="mf-group">
          <label class="mf-label">Package Image</label>
          <div class="img-field">
            <div class="img-thumb" *ngIf="form.imageUrl; else noSetImg">
              <img [src]="imageSrc(form.imageUrl)" [alt]="form.setName || 'Package'" />
              <button type="button" class="img-remove" (click)="removeImage()" title="Remove image">&#x2715;</button>
            </div>
            <ng-template #noSetImg>
              <div class="img-thumb img-thumb--empty">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2.5" y="3.5" width="15" height="13" rx="2"/><circle cx="7" cy="8" r="1.5"/><path d="M3 14l4-4 3 3 3-3 4 4"/></svg>
              </div>
            </ng-template>
            <div class="img-actions">
              <input #setImgInput type="file" accept="image/png,image/jpeg,image/webp,image/gif" hidden
                     (change)="onImageSelected($event)" />
              <button type="button" class="img-btn" (click)="setImgInput.click()" [disabled]="uploadingImage">
                {{ uploadingImage ? 'Uploading...' : (form.imageUrl ? 'Change' : 'Upload') }}
              </button>
              <small class="img-hint">JPG, PNG, WEBP or GIF &middot; max 5 MB</small>
            </div>
          </div>
        </div>
        <div class="mf-group">
          <label class="mf-label">Sales Budget Line</label>
          <erp-dropdown name="salesBudgetLineId" [(ngModel)]="form.salesBudgetLineId"
            [items]="budgetLines" bindLabel="label" bindValue="id"
            placeholder="-- Select Budget Line --">
          </erp-dropdown>
        </div>
        <div class="mf-group">
          <label class="mf-label">Select Items (Multi)</label>
          <erp-multiselect
            name="selectedItemIds"
            [(ngModel)]="form.selectedItemIds"
            [options]="itemOptions"
            placeholder="Select items...">
          </erp-multiselect>
          <div style="font-size:12px;color:#888;margin-top:4px">Selected: {{ form.selectedItemIds.length }}</div>
        </div>
        <div class="mf-actions">
          <button type="submit" class="mf-btn submit"><svg viewBox="0 0 20 20"><polyline points="3 10 8 15 17 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Submit</button>
          <button type="button" class="mf-btn cancel" (click)="cancel()"><svg viewBox="0 0 20 20"><line x1="5" y1="5" x2="15" y2="15" fill="none" stroke="currentColor" stroke-width="2"/><line x1="15" y1="5" x2="5" y2="15" fill="none" stroke="currentColor" stroke-width="2"/></svg>Cancel</button>
          <button type="button" class="mf-btn clear" (click)="clearForm()"><svg viewBox="0 0 20 20"><path d="M3 10a7 7 0 1 0 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="3 5 3 10 8 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Clear</button>
        </div>
      </form>
    </div>
  </div>
  <erp-master-popup
    [showDeleteConfirm]="showDeleteModal"
    [showResult]="showResultPopup"
    [isSuccess]="popupIsSuccess"
    [message]="popupMessage"
    (deleteConfirmed)="confirmDelete()"
    (deleteCancelled)="showDeleteModal=false"
    (resultClosed)="showResultPopup=false">
  </erp-master-popup>
</div>
