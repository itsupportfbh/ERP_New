<div class="dt-pg">
  <div class="dt-card">
    <div class="dt-card-head"><h2>Warehouse List</h2></div>
    <div class="dt-controls">
      <div class="dt-show">Show <select class="dt-pg-select" [(ngModel)]="pageSize" name="pageSize" (change)="applyFilter()"><option [value]="10">10</option><option [value]="25">25</option><option [value]="50">50</option></select> entries</div>
      <div class="dt-right">
        <div class="dt-search-wrap">Search: <input class="dt-search-input" type="text" [(ngModel)]="searchText" name="search" (input)="applyFilter()" placeholder="Search..."/></div>
        <button class="mbtn-add" (click)="showForm()" *ngIf="canCreate()">Add</button>
      </div>
    </div>
    <div class="dt-table-wrap">
      <table class="dt-table">
        <thead><tr>
          <th (click)="sortBy('name')">WAREHOUSE NAME <span class="sort-arr">⇅</span></th>
          <th (click)="sortBy('phone')">PHONE <span class="sort-arr">⇅</span></th>
          <th>ADDRESS</th>
          <th>ACTIONS</th>
        </tr></thead>
        <tbody>
          <tr *ngFor="let item of pagedItems">
            <td>{{ item.name }}</td>
            <td>{{ item.phone }}</td>
            <td>{{ item.address }}</td>
            <td><div class="dt-actions-cell">
              <button class="dt-icon-btn edit" (click)="edit(item)" title="Edit" *ngIf="canEdit()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 3l4 4-10 10H3v-4L13 3z"/></svg></button>
              <button class="dt-icon-btn del" (click)="openDelete(item)" title="Delete" *ngIf="canDelete()"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="5 7 5 18 15 18 15 7"/><line x1="3" y1="7" x2="17" y2="7"/><path d="M8 7V4h4v3"/></svg></button>
            </div></td>
          </tr>
          <tr *ngIf="!loading && filteredItems.length===0"><td colspan="4" class="dt-empty">No records found.</td></tr>
          <tr *ngIf="loading"><td colspan="4" class="dt-empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="dt-footer">{{ filteredItems.length }} total</div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="dt-modal-overlay" *ngIf="isFormVisible" (click)="cancel()">
    <div class="dt-modal" (click)="$event.stopPropagation()">
      <h3 class="dt-modal-title">{{ isEditMode ? 'Edit' : 'Add' }} Warehouse</h3>
      <form (ngSubmit)="onSubmit()" #f="ngForm">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px;">
          <div class="mf-group"><label class="mf-label">Warehouse Name</label><input class="mf-input" type="text" [(ngModel)]="form.name" name="name" placeholder="Warehouse Name"/></div>
          <div class="mf-group"><label class="mf-label">Phone</label><input class="mf-input" type="text" [(ngModel)]="form.phone" name="phone" placeholder="Phone"/></div>
          <div class="mf-group"><label class="mf-label">Location <span style="color:red">*</span></label><select class="mf-select" [(ngModel)]="form.locationId" name="locationId" (ngModelChange)="onLocationChange()"><option [ngValue]="null">-- Select Location --</option><option *ngFor="let item of locations" [ngValue]="item.id">{{ item.name || item.locationName }}</option></select></div>
          <div class="mf-group"><label class="mf-label">Description</label><input class="mf-input" type="text" [(ngModel)]="form.description" name="description" placeholder="Description"/></div>
          <div class="mf-group" style="grid-column:1/-1"><label class="mf-label">Address</label><input class="mf-input" type="text" [(ngModel)]="form.address" name="address" placeholder="Address"/></div>
          <div class="mf-group" style="grid-column:1/-1">
            <erp-multiselect
              label="Bins"
              placeholder="-- Select Bins --"
              [options]="binOptions"
              [disabled]="!form.locationId"
              [(ngModel)]="form.binIds"
              name="binIds">
            </erp-multiselect>
          </div>
        </div>
        <div class="mf-actions">
          <button type="submit" class="mf-btn submit"><svg viewBox="0 0 20 20"><polyline points="3 10 8 15 17 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Submit</button>
          <button type="button" class="mf-btn cancel" (click)="cancel()"><svg viewBox="0 0 20 20"><line x1="5" y1="5" x2="15" y2="15" fill="none" stroke="currentColor" stroke-width="2"/><line x1="15" y1="5" x2="5" y2="15" fill="none" stroke="currentColor" stroke-width="2"/></svg>Cancel</button>
          <button type="button" class="mf-btn clear" (click)="clearForm()"><svg viewBox="0 0 20 20"><path d="M3 10a7 7 0 1 0 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="3 5 3 10 8 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Clear</button>
        </div>
      </form>
    </div>
  </div>

  <erp-master-popup
    [showDeleteConfirm]="showDeleteModal"
    [showResult]="showResultPopup"
    [isSuccess]="popupIsSuccess"
    [message]="popupMessage"
    (deleteConfirmed)="confirmDelete()"
    (deleteCancelled)="showDeleteModal=false"
    (resultClosed)="showResultPopup=false">
  </erp-master-popup>
</div>
