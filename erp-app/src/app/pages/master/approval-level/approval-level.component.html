<div class="master-pg">
  <div class="master-wrap" [class.split]="isFormVisible">

    <!-- List -->
    <div class="mcard">
      <div class="mcard-head">
        <div class="mcard-title">
          <div class="mcard-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2L4 5v5c0 4 3 7.5 6 8.5 3-1 6-4.5 6-8.5V5L10 2z"/></svg>
          </div>
          <span>Approval Level List</span>
        </div>
        <button class="mbtn-create" (click)="showForm()">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="8"/><line x1="10" y1="6" x2="10" y2="14"/><line x1="6" y1="10" x2="14" y2="10"/></svg>
          Create
        </button>
      </div>
      <div class="mcard-body">
        <div class="mlist-loading" *ngIf="loading">Loading…</div>
        <div class="mlist-empty" *ngIf="!loading && items.length===0">No records found.</div>
        <div class="mlist-item" *ngFor="let item of items">
          <div class="mitem-left">
            <div class="mitem-avatar">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2L4 5v5c0 4 3 7 6 8 3-1 6-4 6-8V5L10 2z"/><polyline points="7 10 9.5 12.5 13 8"/></svg>
            </div>
            <div class="mitem-info">
              <div class="mitem-name">{{ item.name }}</div>
              <div class="mitem-sub" *ngIf="item.description">{{ item.description }}</div>
            </div>
          </div>
          <div class="mitem-actions">
            <button class="micon-btn edit" (click)="edit(item)" title="Edit">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 3l4 4-10 10H3v-4L13 3z"/></svg>
            </button>
            <button class="micon-btn del" (click)="openDelete(item)" title="Delete">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="5 7 5 18 15 18 15 7"/><line x1="3" y1="7" x2="17" y2="7"/><path d="M8 7V4h4v3"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Form -->
    <div class="mform-card" *ngIf="isFormVisible">
      <h3 class="mform-title">{{ isEditMode ? 'Edit' : 'Create' }} Approval Level</h3>
      <form (ngSubmit)="onSubmit()" #f="ngForm">
        <div class="mf-group">
          <label class="mf-label">Name</label>
          <input class="mf-input" type="text" [(ngModel)]="form.name" name="name" placeholder="Name"/>
        </div>
        <div class="mf-group">
          <label class="mf-label">Description</label>
          <textarea class="mf-input mf-textarea" [(ngModel)]="form.description" name="description" placeholder="Description (optional)" rows="3"></textarea>
        </div>
        <div class="mf-actions">
          <button type="submit" class="mf-btn submit">
            <svg viewBox="0 0 20 20"><polyline points="3 10 8 15 17 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Submit
          </button>
          <button type="button" class="mf-btn cancel" (click)="cancel()">
            <svg viewBox="0 0 20 20"><line x1="5" y1="5" x2="15" y2="15" fill="none" stroke="currentColor" stroke-width="2"/><line x1="15" y1="5" x2="5" y2="15" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            Cancel
          </button>
          <button type="button" class="mf-btn clear" (click)="clearForm()">
            <svg viewBox="0 0 20 20"><path d="M3 10a7 7 0 1 0 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="3 5 3 10 8 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Clear
          </button>
        </div>
      </form>
    </div>
  </div>

  <erp-master-popup
    [showDeleteConfirm]="showDeleteModal"
    [showResult]="showResultPopup"
    [isSuccess]="popupIsSuccess"
    [message]="popupMessage"
    (deleteConfirmed)="confirmDelete()"
    (deleteCancelled)="showDeleteModal=false"
    (resultClosed)="showResultPopup=false">
  </erp-master-popup>
</div>
