<div class="page-container">
  <div class="page-header">
    <h2>Sales Order</h2>
    <div class="btn-group">
      <button class="btn btn-primary btn-sm" routerLink="/app/sales-order/new">+ New Order</button>
      <button class="btn btn-outline btn-sm">&#x2913; Export</button>
    </div>
  </div>

  <div class="card filter-bar">
    <div class="form-row cols-4">
      <erp-input label="Search" placeholder="Order no / customer..." [(ngModel)]="filter.search"></erp-input>
      <erp-dropdown label="Status" [options]="statusOptions" [(ngModel)]="filter.status"></erp-dropdown>
      <erp-input label="From Date" type="date" [(ngModel)]="filter.dateFrom"></erp-input>
      <erp-input label="To Date" type="date" [(ngModel)]="filter.dateTo"></erp-input>
    </div>
  </div>

  <div class="card table-section">
    <erp-table
      [columns]="columns"
      [data]="tableData"
      [loading]="loading"
      [selectable]="true"
      rowKey="orderNo"
      (sortChange)="onSort($event)">
    </erp-table>
    <erp-pager
      [totalItems]="allData.length"
      [pageSize]="pageSize"
      [currentPage]="currentPage"
      (pageChange)="onPage($event)"
      (pageSizeChange)="onPageSize($event)">
    </erp-pager>
  </div>
</div>
