<div class="rfq-page">

  <!-- Page header -->
  <div class="page-header">
    <button class="btn btn-outline btn-sm" (click)="back()">&#8592; Back</button>
    <h2>{{ title }}</h2>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" [disabled]="saving" (click)="save()">
        <span class="btn-spinner" *ngIf="saving"></span>
        {{ saving ? 'Saving…' : '&#128190; Save Draft' }}
      </button>
      <button class="btn btn-primary btn-sm" [disabled]="saving" (click)="submit()">
        <span class="btn-spinner" *ngIf="saving"></span>
        {{ saving ? 'Submitting…' : '&#9993; Submit RFQ' }}
      </button>
    </div>
  </div>

  <div class="loading-row" *ngIf="loading">
    <div class="spinner-sm"></div> Loading…
  </div>

  <div class="alert-error" *ngIf="error">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <circle cx="10" cy="10" r="9"/><line x1="10" y1="6" x2="10" y2="10"/>
      <line x1="10" y1="13.5" x2="10.01" y2="13.5"/>
    </svg>
    {{ error }}
  </div>

  <ng-container *ngIf="!loading">

    <!-- RFQ Details -->
    <div class="card section-card">
      <div class="section-label">RFQ Details</div>
      <div class="form-row cols-3">
        <erp-input label="RFQ No" [(ngModel)]="rfqNumber" placeholder="Auto-generated" [disabled]="isEdit"></erp-input>
        <erp-input label="Valid Until *" type="date" [(ngModel)]="validUntil"></erp-input>
        <erp-dropdown label="Send Via" [options]="sendViaOptions" [(ngModel)]="sendVia"></erp-dropdown>
      </div>
      <div class="form-row cols-1">
        <erp-input label="Remarks" [(ngModel)]="remarks" placeholder="Notes / instructions for suppliers"></erp-input>
      </div>
    </div>

    <!-- Suppliers -->
    <div class="card section-card">
      <div class="section-label-row">
        <div class="section-label">Suppliers to Quote</div>
        <button class="btn btn-outline btn-xs" (click)="addSupplier()">+ Add Supplier</button>
      </div>

      <div class="lines-table-wrap">
        <table class="lines-table">
          <colgroup>
            <col style="width:28px">
            <col style="min-width:180px">
            <col style="min-width:180px">
            <col style="width:160px">
            <col style="width:140px">
            <col style="width:30px">
          </colgroup>
          <thead>
            <tr>
              <th>#</th>
              <th>Select Supplier</th>
              <th>Name *</th>
              <th>Email</th>
              <th>Phone / WhatsApp</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let sup of suppliers; let i = index">
              <td class="row-num">{{ i + 1 }}</td>
              <td>
                <erp-dropdown [options]="supplierOptions" [(ngModel)]="sup.supplierId"
                  placeholder="Pick supplier"
                  (ngModelChange)="onSupplierSelect(sup)"></erp-dropdown>
              </td>
              <td>
                <erp-input [(ngModel)]="sup.name" placeholder="Supplier name"></erp-input>
              </td>
              <td>
                <erp-input [(ngModel)]="sup.email" placeholder="email@domain.com"></erp-input>
              </td>
              <td>
                <erp-input [(ngModel)]="sup.phone" placeholder="+65 XXXX XXXX"></erp-input>
              </td>
              <td class="del-col">
                <button class="btn-icon danger" (click)="removeSupplier(i)" title="Remove">
                  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                    <line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/>
                  </svg>
                </button>
              </td>
            </tr>
            <tr *ngIf="!suppliers.length">
              <td colspan="6" class="empty-lines">Add suppliers to send this RFQ to</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Items -->
    <div class="card section-card">
      <div class="section-label-row">
        <div class="section-label">Items Required</div>
        <button class="btn btn-outline btn-xs" (click)="addItem()">+ Add Item</button>
      </div>

      <div class="lines-table-wrap">
        <table class="lines-table">
          <colgroup>
            <col style="width:28px">
            <col style="min-width:200px">
            <col style="min-width:160px">
            <col style="width:90px">
            <col style="width:110px">
            <col style="min-width:160px">
            <col style="width:30px">
          </colgroup>
          <thead>
            <tr>
              <th>#</th>
              <th>Item *</th>
              <th>Item Name (override)</th>
              <th>Qty *</th>
              <th>UOM</th>
              <th>Remarks</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of items; let i = index">
              <td class="row-num">{{ i + 1 }}</td>
              <td class="item-col">
                <erp-dropdown [options]="itemOptions" [(ngModel)]="item.itemId"
                  placeholder="Select item"
                  (ngModelChange)="onItemSelect(item)"></erp-dropdown>
              </td>
              <td>
                <erp-input [(ngModel)]="item.itemName" placeholder="Item description"></erp-input>
              </td>
              <td class="qty-col">
                <erp-input type="number" [(ngModel)]="item.quantity" placeholder="0"></erp-input>
              </td>
              <td class="uom-col">
                <erp-dropdown [options]="uomOptions" [(ngModel)]="item.uomId"
                  placeholder="UOM"
                  (ngModelChange)="onUomSelect(item)"></erp-dropdown>
              </td>
              <td class="remarks-col">
                <erp-input [(ngModel)]="item.remarks" placeholder="Notes"></erp-input>
              </td>
              <td class="del-col">
                <button class="btn-icon danger" (click)="removeItem(i)" title="Remove">
                  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                    <line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/>
                  </svg>
                </button>
              </td>
            </tr>
            <tr *ngIf="!items.length">
              <td colspan="7" class="empty-lines">Add items you want suppliers to quote for</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </ng-container>
</div>
