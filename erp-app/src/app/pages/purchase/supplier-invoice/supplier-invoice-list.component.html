<div class="list-page">
  <div class="page-header">
    <h2>Supplier Invoices (PIN)</h2>
    <div class="header-actions">
      <erp-input placeholder="Search invoice…" [(ngModel)]="search" (ngModelChange)="applyFilter()"></erp-input>
      <button class="btn btn-primary btn-sm" (click)="create()">+ New Invoice</button>
    </div>
  </div>
  <div class="card table-card">
    <erp-table [columns]="columns" [data]="filtered" [loading]="loading" (rowClick)="onRowClick($event)"></erp-table>
  </div>
</div>
