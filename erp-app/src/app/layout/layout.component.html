<div class="shell" [class.sidebar-closed]="!sidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img class="logo-img" src="assets/images/catering-logo.png" alt="Catering Solutions">
      <span class="logo-text" *ngIf="sidebarOpen">Unity ERP</span>
    </div>
    <div class="sidebar-search" *ngIf="sidebarOpen">
      <svg class="sidebar-search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/>
      </svg>
      <input class="sidebar-search-input" type="text" [(ngModel)]="menuSearch" placeholder="Search menu..." autocomplete="off" />
      <button class="sidebar-search-clear" *ngIf="menuSearch" (click)="menuSearch=''" type="button">&#x2715;</button>
    </div>

    <nav class="sidebar-nav">
      <ng-container *ngFor="let m of searchedMenus">

        <!-- Parent menu (has children) -->
        <ng-container *ngIf="hasChildren(m)">
          <button
            type="button"
            class="nav-item nav-parent"
            [class.active]="isMenuActive(m)"
            [class.open]="isOpen(m)"
            (click)="toggleMenu(m)">
            <span class="nav-icon" [ngSwitch]="m.icon">
              <svg *ngSwitchCase="'home'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8L8 2l7 6v6H1z"/><path d="M5 14V9h6v5"/></svg>
              <svg *ngSwitchCase="'partners'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="5" r="2.5"/><path d="M1 14c0-2.76 2.24-5 5-5"/><circle cx="11" cy="5" r="2"/><path d="M11 9c2.21 0 4 1.79 4 4"/></svg>
              <svg *ngSwitchCase="'purchase'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3h8l1 9H3z"/><path d="M6 3a2 2 0 0 1 4 0"/></svg>
              <svg *ngSwitchCase="'sales'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 2h2l2.5 8h6l2-6H5"/><circle cx="7" cy="13.5" r="1.2"/><circle cx="12" cy="13.5" r="1.2"/></svg>
              <svg *ngSwitchCase="'inventory'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2L14 5v6L8 14 2 11V5z"/><polyline points="2 5 8 8 14 5"/><line x1="8" y1="8" x2="8" y2="14"/></svg>
              <svg *ngSwitchCase="'components'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
              <svg *ngSwitchCase="'master'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1.5v1.5M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.06 1.06M11.54 11.54l1.06 1.06M3.4 12.6l1.06-1.06M11.54 4.46l1.06-1.06"/></svg>
              <svg *ngSwitchCase="'finance'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 4v8"/><path d="M10 5.5a2 2 0 0 0-4 0c0 1.5 4 1.5 4 3a2 2 0 0 1-4 0"/></svg>
              <svg *ngSwitchCase="'recipe'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8h12c0 3.31-2.69 6-6 6S2 11.31 2 8z"/><line x1="8" y1="2" x2="8" y2="8"/><line x1="5" y1="4" x2="8" y2="8"/><line x1="11" y1="4" x2="8" y2="8"/></svg>
              <span *ngSwitchDefault>&#9679;</span>
            </span>
            <span class="nav-label" *ngIf="sidebarOpen">{{ m.label }}</span>
            <span class="nav-caret" *ngIf="sidebarOpen">&#x25BE;</span>
          </button>

          <!-- Level-2 submenu -->
          <div class="submenu" *ngIf="isOpen(m) && sidebarOpen">
            <ng-container *ngFor="let child of m.children">

              <!-- Level-3 collapsible (e.g. Internal) -->
              <ng-container *ngIf="hasChildren(child)">
                <button type="button" class="submenu-item submenu-parent"
                  [class.open]="isOpen(child)"
                  (click)="toggleMenu(child)">
                  <span class="submenu-dot">&#8627;</span>
                  <span>{{ child.label }}</span>
                  <span class="submenu-caret">&#x25BE;</span>
                </button>
                <div class="submenu-nested" *ngIf="isOpen(child)">
                  <a class="submenu-item submenu-item--nested"
                    *ngFor="let grandchild of child.children"
                    [routerLink]="grandchild.route"
                    [class.active]="isChildActive(grandchild)">
                    <span class="submenu-dot">&#9679;</span>
                    <span>{{ grandchild.label }}</span>
                  </a>
                </div>
              </ng-container>

              <!-- Regular leaf child -->
              <ng-container *ngIf="!hasChildren(child)">
                <a class="submenu-item"
                  [routerLink]="child.route"
                  [queryParams]="child.queryParams"
                  [class.active]="isChildActive(child)">
                  <span class="submenu-dot">&#9679;</span>
                  <span>{{ child.label }}</span>
                </a>
              </ng-container>

            </ng-container>
          </div>
        </ng-container>

        <!-- Single leaf menu item (no children) -->
        <ng-container *ngIf="!hasChildren(m)">
          <a class="nav-item" [routerLink]="m.route" routerLinkActive="active">
            <span class="nav-icon" [ngSwitch]="m.icon">
              <svg *ngSwitchCase="'home'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8L8 2l7 6v6H1z"/><path d="M5 14V9h6v5"/></svg>
              <svg *ngSwitchCase="'partners'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="5" r="2.5"/><path d="M1 14c0-2.76 2.24-5 5-5"/><circle cx="11" cy="5" r="2"/><path d="M11 9c2.21 0 4 1.79 4 4"/></svg>
              <svg *ngSwitchCase="'purchase'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3h8l1 9H3z"/><path d="M6 3a2 2 0 0 1 4 0"/></svg>
              <svg *ngSwitchCase="'sales'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 2h2l2.5 8h6l2-6H5"/><circle cx="7" cy="13.5" r="1.2"/><circle cx="12" cy="13.5" r="1.2"/></svg>
              <svg *ngSwitchCase="'inventory'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2L14 5v6L8 14 2 11V5z"/><polyline points="2 5 8 8 14 5"/><line x1="8" y1="8" x2="8" y2="14"/></svg>
              <svg *ngSwitchCase="'components'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
              <svg *ngSwitchCase="'master'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1.5v1.5M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.06 1.06M11.54 11.54l1.06 1.06M3.4 12.6l1.06-1.06M11.54 4.46l1.06-1.06"/></svg>
              <svg *ngSwitchCase="'finance'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 4v8"/><path d="M10 5.5a2 2 0 0 0-4 0c0 1.5 4 1.5 4 3a2 2 0 0 1-4 0"/></svg>
              <svg *ngSwitchCase="'recipe'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8h12c0 3.31-2.69 6-6 6S2 11.31 2 8z"/><line x1="8" y1="2" x2="8" y2="8"/><line x1="5" y1="4" x2="8" y2="8"/><line x1="11" y1="4" x2="8" y2="8"/></svg>
              <span *ngSwitchDefault>&#9679;</span>
            </span>
            <span class="nav-label" *ngIf="sidebarOpen">{{ m.label }}</span>
          </a>
        </ng-container>

      </ng-container>
    </nav>
  </aside>

  <!-- Main area -->
  <div class="main-area">
    <!-- Topbar -->
    <header class="topbar">
      <button class="toggle-btn" (click)="sidebarOpen = !sidebarOpen" title="Toggle sidebar">
        <span>&#9776;</span>
      </button>
      <span class="topbar-title">Unity ERP</span>
      <div class="topbar-right">
        <div class="user-menu-wrap" clickOutside (clickOutside)="userMenuOpen=false">
          <button class="user-menu-btn" (click)="userMenuOpen=!userMenuOpen">
            <div class="avatar">{{ userInitial }}</div>
            <span class="user-name" *ngIf="sidebarOpen">{{ userName }}</span>
            <svg class="caret-icon" [class.open]="userMenuOpen" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="4 6 8 10 12 6"/>
            </svg>
          </button>
          <div class="user-dropdown" *ngIf="userMenuOpen">
            <a class="dd-item" routerLink="/app/change-password" (click)="userMenuOpen=false">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <rect x="3" y="9" width="14" height="10" rx="2"/>
                <path d="M6 9V6.5a4 4 0 1 1 8 0V9"/>
              </svg>
              Change Password
            </a>
            <div class="dd-divider"></div>
            <button class="dd-item dd-item--danger" (click)="logout(); userMenuOpen=false">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <path d="M7 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h3"/>
                <polyline points="13 15 17 10 13 5"/>
                <line x1="17" y1="10" x2="7" y2="10"/>
              </svg>
              Logout
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
