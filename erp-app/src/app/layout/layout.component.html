<div class="shell" [class.sidebar-closed]="!sidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text" *ngIf="sidebarOpen">Unity ERP</span>
    </div>
    <nav class="sidebar-nav">
      <ng-container *ngFor="let m of menus">

        <!-- Parent menu (has children) -->
        <ng-container *ngIf="hasChildren(m)">
          <button
            type="button"
            class="nav-item nav-parent"
            [class.active]="isMenuActive(m)"
            [class.open]="isOpen(m)"
            (click)="toggleMenu(m)">
            <span class="nav-icon" [ngSwitch]="m.icon">
              <span *ngSwitchCase="'home'">&#8962;</span>
              <span *ngSwitchCase="'partners'">&#128101;</span>
              <span *ngSwitchCase="'purchase'">&#128230;</span>
              <span *ngSwitchCase="'sales'">&#128722;</span>
              <span *ngSwitchCase="'inventory'">&#128230;</span>
              <span *ngSwitchCase="'components'">&#129513;</span>
              <span *ngSwitchCase="'master'">&#9881;</span>
              <span *ngSwitchDefault>&#9679;</span>
            </span>
            <span class="nav-label" *ngIf="sidebarOpen">{{ m.label }}</span>
            <span class="nav-caret" *ngIf="sidebarOpen">&#x25BE;</span>
          </button>

          <!-- Level-2 submenu -->
          <div class="submenu" *ngIf="isOpen(m) && sidebarOpen">
            <ng-container *ngFor="let child of m.children">

              <!-- Level-3 collapsible (e.g. Internal) -->
              <ng-container *ngIf="hasChildren(child)">
                <button type="button" class="submenu-item submenu-parent"
                  [class.open]="isOpen(child)"
                  (click)="toggleMenu(child)">
                  <span class="submenu-dot">&#8627;</span>
                  <span>{{ child.label }}</span>
                  <span class="submenu-caret">&#x25BE;</span>
                </button>
                <div class="submenu-nested" *ngIf="isOpen(child)">
                  <a class="submenu-item submenu-item--nested"
                    *ngFor="let grandchild of child.children"
                    [routerLink]="grandchild.route"
                    [class.active]="isChildActive(grandchild)">
                    <span class="submenu-dot">&#9679;</span>
                    <span>{{ grandchild.label }}</span>
                  </a>
                </div>
              </ng-container>

              <!-- Regular leaf child -->
              <ng-container *ngIf="!hasChildren(child)">
                <a class="submenu-item"
                  [routerLink]="child.route"
                  [queryParams]="child.queryParams"
                  [class.active]="isChildActive(child)">
                  <span class="submenu-dot" [ngSwitch]="child.icon">
                    <!-- Business Partners -->
                    <span *ngSwitchCase="'customer'">&#128100;</span>
                    <span *ngSwitchCase="'supplier'">&#128666;</span>
                    <span *ngSwitchCase="'users'">&#128101;</span>
                    <!-- Purchase -->
                    <span *ngSwitchCase="'pr'">&#128203;</span>
                    <span *ngSwitchCase="'po'">&#128230;</span>
                    <span *ngSwitchCase="'rfq'">&#128172;</span>
                    <span *ngSwitchCase="'grn'">&#128229;</span>
                    <span *ngSwitchCase="'invoice'">&#129518;</span>
                    <span *ngSwitchCase="'debit'">&#128196;</span>
                    <span *ngSwitchCase="'match'">&#9878;</span>
                    <span *ngSwitchCase="'scorecard'">&#11088;</span>
                    <!-- Master — unique SVG icons -->
                    <!-- Approval Level: shield + check -->
                    <svg *ngSwitchCase="'m-approval'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2L3 4v4c0 3 2.5 5 5 6 2.5-1 5-3 5-6V4z"/><polyline points="5.5 8 7.5 10.5 11 6"/></svg>
                    <!-- Bank: columns + roof -->
                    <svg *ngSwitchCase="'m-bank'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polygon points="8 1 15 5 1 5"/><line x1="3" y1="5" x2="3" y2="12"/><line x1="6" y1="5" x2="6" y2="12"/><line x1="10" y1="5" x2="10" y2="12"/><line x1="13" y1="5" x2="13" y2="12"/><line x1="1" y1="12" x2="15" y2="12"/></svg>
                    <!-- Bin: open box/container -->
                    <svg *ngSwitchCase="'m-bin'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h12v7a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6z"/><path d="M1 4h14v2H1z"/><line x1="6" y1="9" x2="10" y2="9"/></svg>
                    <!-- Category: folder with tag -->
                    <svg *ngSwitchCase="'m-category'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4a1 1 0 0 1 1-1h4l2 2h6a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1z"/><circle cx="6" cy="9" r="1.2"/></svg>
                    <!-- Cities: skyline buildings -->
                    <svg *ngSwitchCase="'m-cities'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="7" width="4" height="7"/><rect x="6" y="4" width="4" height="10"/><rect x="11" y="6" width="4" height="8"/><line x1="1" y1="7" x2="1" y2="5"/><line x1="5" y1="7" x2="5" y2="5"/></svg>
                    <!-- Costing Method: coins stack -->
                    <svg *ngSwitchCase="'m-costing'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><ellipse cx="8" cy="5" rx="5" ry="2"/><path d="M3 5v3c0 1.1 2.24 2 5 2s5-.9 5-2V5"/><path d="M3 8v3c0 1.1 2.24 2 5 2s5-.9 5-2V8"/></svg>
                    <!-- Company: office building -->
                    <svg *ngSwitchCase="'m-company'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="12"/><path d="M5 15V9h6v6"/><rect x="5" y="5" width="2" height="2"/><rect x="9" y="5" width="2" height="2"/></svg>
                    <!-- Countries: globe with meridians -->
                    <svg *ngSwitchCase="'m-countries'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M2 8h12"/><path d="M8 2c-2 2-2 8 0 12"/><path d="M8 2c2 2 2 8 0 12"/></svg>
                    <!-- Currency: dollar sign in circle -->
                    <svg *ngSwitchCase="'m-currency'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 4v8"/><path d="M10 5.5a2 2 0 0 0-4 0c0 1.5 4 1.5 4 3a2 2 0 0 1-4 0"/></svg>
                    <!-- Customer Groups: two people -->
                    <svg *ngSwitchCase="'m-custgrp'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="6" cy="5" r="2.5"/><path d="M1 14c0-2.76 2.24-5 5-5"/><circle cx="11" cy="5" r="2"/><path d="M11 9c2.21 0 4 1.79 4 4"/></svg>
                    <!-- Department: org chart -->
                    <svg *ngSwitchCase="'m-dept'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="6" y="1" width="4" height="3"/><rect x="1" y="10" width="4" height="3"/><rect x="6" y="10" width="4" height="3"/><rect x="11" y="10" width="4" height="3"/><line x1="8" y1="4" x2="8" y2="7"/><path d="M3 7h10v3"/><line x1="8" y1="7" x2="8" y2="10"/></svg>
                    <!-- Driver: steering wheel -->
                    <svg *ngSwitchCase="'m-driver'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="4.1" y1="11.9" x2="6.6" y2="9.4"/><line x1="11.9" y1="11.9" x2="9.4" y2="9.4"/></svg>
                    <!-- Exchange Rate: two arrows -->
                    <svg *ngSwitchCase="'m-exchange'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 5 5 2 8 5"/><line x1="5" y1="2" x2="5" y2="11"/><polyline points="14 11 11 14 8 11"/><line x1="11" y1="14" x2="11" y2="5"/></svg>
                    <!-- Flag Issue: flag on pole -->
                    <svg *ngSwitchCase="'m-flag'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="2" x2="3" y2="14"/><path d="M3 2l9 3-9 3"/></svg>
                    <!-- Incoterms: ship/anchor -->
                    <svg *ngSwitchCase="'m-incoterms'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 11l6-8 6 8"/><path d="M1 11h14l-2 3H3z"/><line x1="8" y1="3" x2="8" y2="11"/></svg>
                    <!-- Item Type: tag with type indicator -->
                    <svg *ngSwitchCase="'m-itemtype'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 2h5l7 7-5 5-7-7V2z"/><circle cx="5" cy="5" r="1"/></svg>
                    <!-- Package List: layers/stack -->
                    <svg *ngSwitchCase="'m-itemset'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="8 2 14 5 8 8 2 5"/><polyline points="2 9 8 12 14 9"/><polyline points="2 12 8 15 14 12"/></svg>
                    <!-- Outlet/Location: map pin -->
                    <svg *ngSwitchCase="'m-location'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 1.5a4.5 4.5 0 0 1 4.5 4.5c0 3.5-4.5 9-4.5 9S3.5 9.5 3.5 6A4.5 4.5 0 0 1 8 1.5z"/><circle cx="8" cy="6" r="1.5"/></svg>
                    <!-- Payment Terms: credit card -->
                    <svg *ngSwitchCase="'m-payment'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="4" width="14" height="9" rx="1.5"/><line x1="1" y1="7" x2="15" y2="7"/><line x1="4" y1="11" x2="7" y2="11"/></svg>
                    <!-- Recurring: refresh arrows -->
                    <svg *ngSwitchCase="'m-recurring'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5"/><polyline points="11 1 14 2.5 11 5"/></svg>
                    <!-- Service: wrench -->
                    <svg *ngSwitchCase="'m-service'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.5 2.5a3 3 0 0 0-4.2 4.2L2 13a1.4 1.4 0 0 0 2 2l6.3-6.3A3 3 0 0 0 14.5 5"/><line x1="4.5" y1="10.5" x2="6.5" y2="12.5"/></svg>
                    <!-- States: map outline -->
                    <svg *ngSwitchCase="'m-states'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3l4 2 4-2 4 2v9l-4-2-4 2-4-2z"/><line x1="6" y1="5" x2="6" y2="14"/><line x1="10" y1="3" x2="10" y2="12"/></svg>
                    <!-- Stock Issue: box with up-arrow -->
                    <svg *ngSwitchCase="'m-stock'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7H2V14H14V7H11"/><polyline points="8 1 8 10"/><polyline points="5 4 8 1 11 4"/></svg>
                    <!-- Frequency/Strategy: target -->
                    <svg *ngSwitchCase="'m-strategy'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="3"/><circle cx="8" cy="8" r="1" fill="currentColor"/></svg>
                    <!-- Supplier Groups: factory -->
                    <svg *ngSwitchCase="'m-suppgrp'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 14 1 7 5 4 5 7 9 4 9 7 14 5 14 14"/><line x1="1" y1="14" x2="15" y2="14"/><rect x="6" y="10" width="4" height="4"/></svg>
                    <!-- Tax Code: percent in circle -->
                    <svg *ngSwitchCase="'m-tax'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><line x1="5" y1="11" x2="11" y2="5"/><circle cx="5.8" cy="6" r="1"/><circle cx="10.2" cy="10" r="1"/></svg>
                    <!-- UOM: ruler -->
                    <svg *ngSwitchCase="'m-uom'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="5" width="14" height="6" rx="1"/><line x1="4" y1="8" x2="4" y2="11"/><line x1="7" y1="8" x2="7" y2="11"/><line x1="10" y1="8" x2="10" y2="11"/><line x1="13" y1="7" x2="13" y2="11"/></svg>
                    <!-- UOM Conversion: scale/balance -->
                    <svg *ngSwitchCase="'m-uomconv'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="2" x2="8" y2="14"/><path d="M3 5l5-3 5 3"/><path d="M2 6h3l-1.5 4a2 2 0 0 0 3 0L5 6"/><path d="M9 6h3l-1.5 4a2 2 0 0 0 3 0L12 6"/></svg>
                    <!-- Vehicle: truck -->
                    <svg *ngSwitchCase="'m-vehicle'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="5" width="9" height="7"/><path d="M10 8h4l1 4H10"/><circle cx="4" cy="13" r="1.5"/><circle cx="12" cy="13" r="1.5"/></svg>
                    <!-- Warehouse: warehouse building -->
                    <svg *ngSwitchCase="'m-warehouse'" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8L8 2l7 6v6H1z"/><rect x="5" y="9" width="3" height="5"/><rect x="9" y="9" width="2" height="3"/></svg>
                    <span *ngSwitchDefault>&#9679;</span>
                  </span>
                  <span>{{ child.label }}</span>
                </a>
              </ng-container>

            </ng-container>
          </div>
        </ng-container>

        <!-- Single leaf menu item (no children) -->
        <ng-container *ngIf="!hasChildren(m)">
          <a class="nav-item" [routerLink]="m.route" routerLinkActive="active">
            <span class="nav-icon" [ngSwitch]="m.icon">
              <span *ngSwitchCase="'home'">&#8962;</span>
              <span *ngSwitchCase="'partners'">&#128101;</span>
              <span *ngSwitchCase="'sales'">&#128722;</span>
              <span *ngSwitchCase="'inventory'">&#128230;</span>
              <span *ngSwitchCase="'components'">&#129513;</span>
              <span *ngSwitchCase="'master'">&#9881;</span>
              <span *ngSwitchDefault>&#9679;</span>
            </span>
            <span class="nav-label" *ngIf="sidebarOpen">{{ m.label }}</span>
          </a>
        </ng-container>

      </ng-container>
    </nav>
  </aside>

  <!-- Main area -->
  <div class="main-area">
    <!-- Topbar -->
    <header class="topbar">
      <button class="toggle-btn" (click)="sidebar.toggleSidebar()" title="Toggle sidebar">
        <span>&#9776;</span>
      </button>
      <span class="topbar-title">Unity ERP</span>
      <div class="topbar-right">
        <div class="user-menu-wrap" clickOutside (clickOutside)="userMenuOpen=false">
          <button class="user-menu-btn" (click)="userMenuOpen=!userMenuOpen">
            <div class="avatar">{{ userInitial }}</div>
            <span class="user-name" *ngIf="sidebarOpen">{{ userName }}</span>
            <svg class="caret-icon" [class.open]="userMenuOpen" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="4 6 8 10 12 6"/>
            </svg>
          </button>
          <div class="user-dropdown" *ngIf="userMenuOpen">
            <a class="dd-item" routerLink="/app/change-password" (click)="userMenuOpen=false">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <rect x="3" y="9" width="14" height="10" rx="2"/>
                <path d="M6 9V6.5a4 4 0 1 1 8 0V9"/>
              </svg>
              Change Password
            </a>
            <div class="dd-divider"></div>
            <button class="dd-item dd-item--danger" (click)="logout(); userMenuOpen=false">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <path d="M7 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h3"/>
                <polyline points="13 15 17 10 13 5"/>
                <line x1="17" y1="10" x2="7" y2="10"/>
              </svg>
              Logout
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
