<div class="field-wrap">
  <label class="field-label" *ngIf="label">
    {{ label }}<span class="req" *ngIf="required">*</span>
  </label>
  <div class="dd-trigger"
       [class.open]="open"
       [class.disabled]="disabled"
       [class.has-error]="errorMsg && touched"
       (click)="toggle()">
    <span class="dd-value" [class.placeholder]="!selectedLabel">{{ selectedLabel || placeholder }}</span>
    <span class="dd-actions">
      <span class="dd-clear" *ngIf="value !== null && value !== undefined" (click)="clear($event)">&#x2715;</span>
      <span class="dd-arrow" [class.rotated]="open">&#x25BE;</span>
    </span>
  </div>

  <!-- Menu rendered at fixed position — escapes overflow:hidden parents -->
  <div class="dd-menu" *ngIf="open" [ngStyle]="menuStyle">
    <div class="dd-search-wrap" (click)="$event.stopPropagation()">
      <input #searchInput class="dd-search" [(ngModel)]="searchText"
             placeholder="Search..." autocomplete="off">
    </div>
    <div class="dd-list">
      <div class="dd-item"
           *ngFor="let opt of filteredOptions"
           [class.selected]="sameValue(opt.value, value)"
           (click)="select(opt)">
        {{ opt.label }}
      </div>
      <div class="dd-empty" *ngIf="filteredOptions.length === 0">No results</div>
    </div>
  </div>

  <span class="field-error" *ngIf="errorMsg && touched">{{ errorMsg }}</span>
</div>
