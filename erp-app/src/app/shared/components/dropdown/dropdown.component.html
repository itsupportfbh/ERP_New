<div class="field-wrap">
  <label class="field-label" *ngIf="label">
    {{ label }}<span class="req" *ngIf="required">*</span>
  </label>
  <!-- A div is not in the tab order, so pressing Tab used to skip every dropdown on the form and
       land on the next native input, making the whole page un-tabbable. tabindex + keyboard handling
       put it back in sequence and let it open/close from the keyboard like a real <select>. -->
  <div class="dd-trigger"
       [class.open]="open"
       [class.disabled]="disabled"
       [class.has-error]="errorMsg && touched"
       [attr.tabindex]="disabled ? null : 0"
       role="combobox"
       [attr.aria-expanded]="open"
       (click)="toggle()"
       (keydown)="onTriggerKeydown($event)">
    <span class="dd-value" [class.placeholder]="!selectedLabel">{{ selectedLabel || placeholder }}</span>
    <span class="dd-actions">
      <span class="dd-clear" *ngIf="value !== null && value !== undefined" (click)="clear($event)">&#x2715;</span>
      <span class="dd-arrow" [class.rotated]="open">&#x25BE;</span>
    </span>
  </div>

  <!-- Menu rendered at fixed position — escapes overflow:hidden parents -->
  <div class="dd-menu" *ngIf="open" [ngStyle]="menuStyle">
    <div class="dd-search-wrap" (click)="$event.stopPropagation()">
      <input #searchInput class="dd-search" [(ngModel)]="searchText"
             placeholder="Search..." autocomplete="off">
    </div>
    <div class="dd-list">
      <div class="dd-item"
           *ngFor="let opt of filteredOptions"
           [class.selected]="sameValue(opt.value, value)"
           [title]="opt.label"
           (mousedown)="select(opt, $event)">
        {{ opt.label }}
      </div>
      <div class="dd-empty" *ngIf="filteredOptions.length === 0 && !allowAdd">No results</div>
    </div>
    <div class="dd-add" *ngIf="allowAdd" (mousedown)="triggerAdd($event)">
      <span class="dd-add-plus">+</span>
      <span class="dd-add-text">Add {{ searchText.trim() ? '"' + searchText.trim() + '"' : ('new ' + (addTypeLabel || 'item')) }}</span>
    </div>
  </div>

  <span class="field-error" *ngIf="errorMsg && touched">{{ errorMsg }}</span>
</div>
