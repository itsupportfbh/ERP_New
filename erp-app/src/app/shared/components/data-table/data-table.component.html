<div class="table-wrap">
  <div class="table-loading" *ngIf="loading">
    <div class="spinner"></div>
    <span>Loading...</span>
  </div>

  <!-- Scrollable container: header sticky, body scrolls vertically -->
  <div class="table-scroll">
    <table class="erp-table" [style.fontSize]="fontSize">
      <colgroup>
        <col *ngIf="selectable" style="width:32px" />
        <!-- Equal width for every column — 100% / N, no fixed px so it auto-fills viewport -->
        <col *ngFor="let col of columns" />
        <col *ngIf="rowActions.length" [style.width]="actionColWidth" />
      </colgroup>

      <thead>
        <tr>
          <th *ngIf="selectable" class="th-check" [style.padding]="cellPad">
            <input type="checkbox"
                   [checked]="allSelected"
                   [indeterminate]="someSelected"
                   (change)="toggleSelectAll($any($event.target).checked)" />
          </th>
          <th *ngFor="let col of columns"
              [class.sortable]="col.sortable"
              [class.sort-active]="sort.key === col.key"
              [style.textAlign]="col.align || 'left'"
              [style.padding]="cellPad"
              [style.fontSize]="headerFontSize"
              (click)="onSort(col)">
            {{ col.header }}<span class="sort-icon" *ngIf="col.sortable">{{ sortIcon(col) }}</span>
          </th>
          <th *ngIf="rowActions.length"
              class="th-actions"
              [style.padding]="cellPad"
              [style.fontSize]="headerFontSize">
            {{ rowActionsHeader }}
          </th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let row of data"
            [class.selected]="isSelected(row)"
            (click)="onRowClick(row)">
          <td *ngIf="selectable" class="td-check" [style.padding]="cellPad"
              (click)="$event.stopPropagation()">
            <input type="checkbox" [checked]="isSelected(row)"
                   (change)="toggleRow(row)" (click)="$event.stopPropagation()" />
          </td>
          <td *ngFor="let col of columns"
              [style.textAlign]="col.align || 'left'"
              [style.padding]="cellPad">

            <!-- Badge -->
            <span *ngIf="col.type === 'badge'"
                  class="badge badge-{{ getBadgeClass(col, getCellValue(row, col)) }}">
              {{ getCellValue(row, col) }}
            </span>

            <!-- Boolean -->
            <ng-container *ngIf="col.type === 'boolean'">
              <span class="bool-dot" [class.on]="getCellValue(row, col)"></span>
              {{ getCellValue(row, col) ? 'Yes' : 'No' }}
            </ng-container>

            <!-- Default: text / number / date — NO ellipsis, full value always shown -->
            <ng-container *ngIf="!col.type || col.type === 'text' || col.type === 'number' || col.type === 'date'">
              {{ getCellValue(row, col) }}
            </ng-container>
          </td>
          <td *ngIf="rowActions.length" [style.padding]="cellPad" (click)="$event.stopPropagation()" style="white-space:nowrap">
            <div style="display:flex;gap:4px;align-items:center">
              <ng-container *ngFor="let act of rowActions">
                <button class="dt-icon-btn"
                  [class.view]="act.key==='view'"
                  [class.edit]="act.key==='edit'"
                  [class.del]="act.key==='delete'"
                  [title]="act.label"
                  (click)="onAction(act.key, row, $event)">
                  <svg *ngIf="act.key==='view'" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"/><circle cx="10" cy="10" r="2.5"/></svg>
                  <svg *ngIf="act.key==='edit'" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 3l3 3-9.5 9.5H4v-3.5L14 3z"/></svg>
                  <svg *ngIf="act.key==='delete'" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h12M8 6V4h4v2M6 6l1 10h6l1-10"/></svg>
                  <span *ngIf="act.key!=='view' && act.key!=='edit' && act.key!=='delete'" style="font-size:11px;font-weight:600">{{ act.label }}</span>
                </button>
              </ng-container>
            </div>
          </td>
        </tr>

        <tr *ngIf="!loading && data.length === 0">
          <td [colSpan]="totalCols" class="empty-row">No records found</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
