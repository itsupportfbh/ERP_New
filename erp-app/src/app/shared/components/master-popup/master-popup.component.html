<!-- Delete Confirm Popup -->
<div class="mpopup-overlay" *ngIf="showDeleteConfirm" (click)="deleteCancelled.emit()">
  <div class="mpopup-modal" (click)="$event.stopPropagation()">
    <div class="mpopup-icon warn">!</div>
    <h3 class="mpopup-title">Confirm Delete</h3>
    <p class="mpopup-msg">Are you sure you want to delete this item?</p>
    <div class="mpopup-actions">
      <button class="mf-btn del-confirm" (click)="deleteConfirmed.emit()">Delete</button>
      <button class="mf-btn cancel-modal" (click)="deleteCancelled.emit()">Cancel</button>
    </div>
  </div>
</div>

<!-- Result Popup (Success / Error) -->
<div class="mpopup-overlay" *ngIf="showResult" (click)="resultClosed.emit()">
  <div class="mpopup-modal" (click)="$event.stopPropagation()">
    <div class="mpopup-icon" [class.success]="isSuccess" [class.error]="!isSuccess">
      <svg *ngIf="isSuccess" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <svg *ngIf="!isSuccess" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
    <h3 class="mpopup-title">{{ isSuccess ? 'Success' : 'Error' }}</h3>
    <p class="mpopup-msg">{{ message }}</p>
    <div class="mpopup-actions">
      <button class="mf-btn" [class.submit]="isSuccess" [class.del-confirm]="!isSuccess" (click)="resultClosed.emit()">OK</button>
    </div>
  </div>
</div>
